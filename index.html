<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXCOURSE Campus Toolkit</title>
    <link rel="icon" type="image/png" sizes="512x512" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link href="/vendor/fonts.css" rel="stylesheet">
    <script src="/vendor/tailwind.js" onerror="this.onerror=null;this.src='https://cdn.tailwindcss.com/3.4.16';"></script>
    <script src="/vendor/react.production.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/react@18.3.1/umd/react.production.min.js';"></script>
    <script src="/vendor/react-dom.production.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js';"></script>
    <script src="/vendor/babel.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/@babel/standalone@7.24.7/babel.min.js';"></script>
    <script src="/vendor/lucide.min.js" onerror="this.onerror=null;this.src='https://unpkg.com/lucide@0.453.0/dist/umd/lucide.min.js';"></script>
    <style>
        :root {
            --paper: #f4efe6;
            --paper-strong: #ece4d7;
            --ink: #101820;
            --line: rgba(16, 24, 32, 0.12);
            --signal: #d6ff62;
            --ember: #ff7a1f;
            --deep: #0d161c;
        }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: 'Space Grotesk', sans-serif;
            background:
                linear-gradient(115deg, rgba(255, 255, 255, 0.78), rgba(255, 255, 255, 0) 38%),
                repeating-linear-gradient(0deg, rgba(16, 24, 32, 0.018) 0 1px, transparent 1px 6px),
                repeating-linear-gradient(90deg, rgba(16, 24, 32, 0.014) 0 1px, transparent 1px 9px),
                linear-gradient(180deg, #fbf7ef 0%, #f3eadf 100%);
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            opacity: 0.38;
            background-image:
                radial-gradient(circle at 18% 22%, rgba(16, 24, 32, 0.045) 0 0.7px, transparent 0.9px),
                radial-gradient(circle at 72% 34%, rgba(16, 24, 32, 0.035) 0 0.6px, transparent 0.8px),
                radial-gradient(circle at 44% 78%, rgba(255, 122, 31, 0.08) 0 0.8px, transparent 1px);
            background-size: 18px 18px, 23px 23px, 31px 31px;
            contain: strict;
            transform: translateZ(0);
            will-change: transform;
        }
        .mono-ui { font-family: 'IBM Plex Mono', monospace; }
        .book-serif {
            font-family: 'Source Han Serif SC', 'Noto Serif SC', 'Songti SC', 'STSong', 'EB Garamond', Georgia, 'Times New Roman', serif;
            font-feature-settings: "liga" 1, "kern" 1, "onum" 1;
        }
        .book-divider {
            border: 0;
            border-top: 1px solid rgba(16, 24, 32, 0.16);
            margin: 0;
        }
        .book-divider-thin {
            border: 0;
            border-top: 1px solid rgba(16, 24, 32, 0.08);
            margin: 0;
        }
        .book-link {
            position: relative;
            display: inline-block;
            color: #1a140d;
            text-decoration: none;
            border-bottom: 1px solid rgba(26, 20, 13, 0.5);
            padding-bottom: 1px;
            transition: border-color 0.18s ease;
        }
        .book-link:hover { border-bottom-color: rgba(26, 20, 13, 1); }
        .book-entry {
            display: grid;
            grid-template-columns: 3rem 1fr auto;
            gap: 1.5rem;
            align-items: baseline;
            padding: 1.4rem 0;
            border-top: 1px solid rgba(26, 20, 13, 0.12);
            cursor: pointer;
            transition: background-color 0.18s ease;
        }
        .book-entry:last-child {
            border-bottom: 1px solid rgba(26, 20, 13, 0.12);
        }
        .book-entry:hover {
            background-color: rgba(26, 20, 13, 0.025);
        }
        .book-entry .arrow {
            opacity: 0;
            transform: translateX(-6px);
            transition: opacity 0.18s ease, transform 0.18s ease;
        }
        .book-entry:hover .arrow {
            opacity: 1;
            transform: translateX(0);
        }
        .home-grid {
            background-image:
                linear-gradient(180deg, rgba(251, 247, 239, 0) 0%, rgba(251, 247, 239, 0.18) 62%, rgba(251, 247, 239, 0.9) 100%),
                linear-gradient(to right, rgba(16, 24, 32, 0.045) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(16, 24, 32, 0.04) 1px, transparent 1px);
            background-size: 100% 100%, 56px 56px, 56px 56px;
            contain: paint;
            transform: translateZ(0);
        }
        .paper-wash {
            background:
                linear-gradient(135deg, rgba(255,255,255,0.62), rgba(255,255,255,0.12)),
                linear-gradient(180deg, rgba(214,255,98,0.08), rgba(255,122,31,0.06));
            border: 1px solid rgba(16, 24, 32, 0.08);
            box-shadow: 0 26px 70px rgba(16, 24, 32, 0.08);
            contain: paint;
            transform: translateZ(0);
        }
        .section-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            border: 1px solid rgba(16, 24, 32, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            contain: paint;
            transform: translateZ(0);
        }
        .room-select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            min-height: 50px;
            padding-right: 3rem;
            font: inherit;
            line-height: 1.25;
            background-image: url("data:image/svg+xml,%3Csvg width='18' height='18' viewBox='0 0 24 24' fill='none' stroke='%23101820' stroke-width='3' stroke-linecap='round' stroke-linejoin='round' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='m6 9 6 6 6-6'/%3E%3C/svg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem center;
            background-size: 1.125rem;
        }
        .room-select::-ms-expand {
            display: none;
        }
        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(26px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .tool-reveal {
            opacity: 0;
            animation: riseIn 0.78s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .reveal-delay-1 { animation-delay: 0.12s; }
        .reveal-delay-2 { animation-delay: 0.22s; }
        .reveal-delay-3 { animation-delay: 0.32s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const toRoman = (n) => {
            const romans = ['I', 'II', 'III', 'IV', 'V', 'VI', 'VII', 'VIII', 'IX', 'X', 'XI', 'XII'];
            return romans[n - 1] || String(n);
        };

        // --- Icon Component ---
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current || !window.lucide) return;
                const iconDef = window.lucide.icons[name];
                if (iconDef) {
                    ref.current.innerHTML = '';
                    if (window.lucide.createElement) {
                        const svg = window.lucide.createElement(iconDef);
                        if (className) svg.setAttribute('class', (svg.getAttribute('class') || '') + ' ' + className);
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
        };

        const Plus = (p) => <Icon name="Plus" {...p} />;
        const Trash2 = (p) => <Icon name="Trash2" {...p} />;
        const Calendar = (p) => <Icon name="Calendar" {...p} />;
        const Clock = (p) => <Icon name="Clock" {...p} />;
        const Award = (p) => <Icon name="Award" {...p} />;
        const Calculator = (p) => <Icon name="Calculator" {...p} />;
        const BookOpen = (p) => <Icon name="BookOpen" {...p} />;
        const AlertCircle = (p) => <Icon name="AlertCircle" {...p} />;
        const RefreshCcw = (p) => <Icon name="RefreshCcw" {...p} />;
        const User = (p) => <Icon name="User" {...p} />;
        const Tag = (p) => <Icon name="Tag" {...p} />;
        const Info = (p) => <Icon name="Info" {...p} />;
        const X = (p) => <Icon name="X" {...p} />;
        const Search = (p) => <Icon name="Search" {...p} />;
        const MapPin = (p) => <Icon name="MapPin" {...p} />;
        const ExternalLink = (p) => <Icon name="ExternalLink" {...p} />;
        const CheckSquare = (p) => <Icon name="CheckSquare" {...p} />;
        const Loader2 = (p) => <Icon name="Loader2" {...p} />;
        const RefreshCw = (p) => <Icon name="RefreshCw" {...p} />;
        const Menu = (p) => <Icon name="Menu" {...p} />;
        const LogOut = (p) => <Icon name="LogOut" {...p} />;
        const LogIn = (p) => <Icon name="LogIn" {...p} />;
        const UserPlus = (p) => <Icon name="UserPlus" {...p} />;
        const ChevronDown = (p) => <Icon name="ChevronDown" {...p} />;
        const Globe = (p) => <Icon name="Globe" {...p} />;
        const Bell = (p) => <Icon name="Bell" {...p} />;
        const Star = (p) => <Icon name="Star" {...p} />;
        const UserCheck = (p) => <Icon name="UserCheck" {...p} />;
        const House = (p) => <Icon name="House" {...p} />;
        const Building2 = (p) => <Icon name="Building2" {...p} />;
        const Wrench = (p) => <Icon name="Wrench" {...p} />;
        const Utensils = (p) => <Icon name="Utensils" {...p} />;

        const Settings = (p) => <Icon name="Settings" {...p} />;

        const SCHOOL_DAY_OPTIONS = [
            { value: 'Mon', label: '周一' },
            { value: 'Tue', label: '周二' },
            { value: 'Wed', label: '周三' },
            { value: 'Thu', label: '周四' },
            { value: 'Fri', label: '周五' },
            { value: 'Sat', label: '周六' },
            { value: 'Sun', label: '周日' }
        ];

        const SCHOOL_PERIODS = [
            { slot: 'P1', start: '08:00', end: '08:50' },
            { slot: 'P2', start: '09:00', end: '09:50' },
            { slot: 'P3', start: '10:00', end: '10:50' },
            { slot: 'P4', start: '11:00', end: '11:50' },
            { slot: 'P5', start: '13:00', end: '13:50' },
            { slot: 'P6', start: '14:00', end: '14:50' },
            { slot: 'P7', start: '15:00', end: '15:50' },
            { slot: 'P8', start: '16:00', end: '16:50' },
            { slot: 'P9', start: '17:00', end: '17:50' },
            { slot: 'P10', start: '18:00', end: '18:50' },
            { slot: 'P11', start: '19:00', end: '19:50' },
            { slot: 'P12', start: '20:00', end: '20:50' },
            { slot: 'P13', start: '21:00', end: '21:50' }
        ];
        const PRIORITY_BUILDINGS = ['T8', 'T7', 'T6', 'T5', 'T4', 'T29'];

        const timeToMinutes = (value) => {
            const [hours, minutes] = String(value).split(':').map(Number);
            return hours * 60 + minutes;
        };

        const getBuildingSortKey = (building) => {
            const normalized = String(building || '').trim().toUpperCase();
            const priorityIndex = PRIORITY_BUILDINGS.indexOf(normalized);

            if (priorityIndex !== -1) {
                return [0, priorityIndex, 0, '', 0, normalized];
            }

            if (normalized === 'CC') {
                return [2, 0, 0, '', 0, normalized];
            }

            const matched = normalized.match(/^([A-Z]+)(\d+)$/);
            if (matched) {
                return [1, 0, 0, matched[1], Number(matched[2]), normalized];
            }

            return [1, 1, 1, normalized, 0, normalized];
        };

        const compareBuildingOrder = (left, right) => {
            const leftKey = getBuildingSortKey(left);
            const rightKey = getBuildingSortKey(right);

            for (let index = 0; index < Math.max(leftKey.length, rightKey.length); index += 1) {
                if (leftKey[index] < rightKey[index]) return -1;
                if (leftKey[index] > rightKey[index]) return 1;
            }

            return 0;
        };

        const getRoomLocationMeta = (roomCode) => {
            const room = String(roomCode || '').trim().toUpperCase();
            const matched = room.match(/^([A-Z0-9]+)-(\d+)([A-Z]*)$/);

            if (!matched) {
                return {
                    room,
                    building: room,
                    floorNumber: null,
                    floorLabel: 'Other',
                    detailLabel: room,
                    roomSuffix: room,
                };
            }

            const [, building, numericPart] = matched;
            const floorNumber = numericPart.length >= 3 ? Number(numericPart[0]) : null;

            return {
                room,
                building,
                floorNumber,
                floorLabel: floorNumber !== null ? `${floorNumber}F` : 'Other',
                detailLabel: floorNumber !== null ? `${building} 教学楼 · ${floorNumber}F` : `${building} 教学楼`,
                roomSuffix: numericPart,
            };
        };

        const compareRoomCode = (left, right) => left.localeCompare(right, undefined, { numeric: true, sensitivity: 'base' });

        const fetchJson = async (url, options = {}) => {
            const response = await fetch(url, options);
            const contentType = (response.headers.get('content-type') || '').toLowerCase();

            if (!contentType.includes('application/json')) {
                const text = await response.text();
                const normalized = text.trim().toLowerCase();
                const looksHtml = normalized.startsWith('<!doctype') || normalized.startsWith('<html');

                if (looksHtml) {
                    throw new Error('接口返回了 HTML 页面。请重启 Flask 服务，确认后端已加载到包含该 API 的最新代码。');
                }

                throw new Error(`接口返回了非 JSON 响应 (${response.status})`);
            }

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || `请求失败 (${response.status})`);
            }

            return data;
        };

        // --- Explorer View ---
        const ExplorerView = ({ availableCourses, onAddCourse, switchToOptimizer, onViewTeacher }) => {
            const [searchQuery, setSearchQuery] = useState('');
            const [filters, setFilters] = useState({ unit: '', programme: '', type: '', day: '', hours: '', session: '' });
            const [currentPage, setCurrentPage] = useState(1);
            const ITEMS_PER_PAGE = 50;

            const allOfferings = useMemo(() => {
                if (!availableCourses) return [];
                const offerings = [];
                availableCourses.forEach(course => {
                    if (!course.details) return;
                    course.details.forEach(row => {
                         const titleAndSession = row['Course Title & Session'] || course.name;
                         let session = "";
                         const sessionMatch = titleAndSession.match(/\((\d+)\)$/);
                         if (sessionMatch) session = sessionMatch[1];

                         offerings.push({
                             code: row['Course Code'] || course.code,
                             title: titleAndSession,
                             name: course.name,
                             session: session,
                             units: row['Units'],
                             teacher: row['Teachers'],
                             schedule: row['Class Schedule'],
                             classroom: row['Classroom'],
                             curriculumType: row['Curriculum Type'],
                             electiveType: row['Elective Type'],
                             offeringUnit: row['Offering Unit'],
                             offeringProgramme: row['Offering Programme'],
                             requirements: row['Requirements'],
                             hours: row['Hours']
                         });
                    });
                });
                return offerings;
            }, [availableCourses]);

            const uniqueOptions = useMemo(() => {
                const units = new Set();
                const programmes = new Set();
                const types = new Set();
                const hoursList = new Set();
                const sessions = new Set();
                allOfferings.forEach(o => {
                    if(o.offeringUnit) units.add(o.offeringUnit);
                    if(o.offeringProgramme) programmes.add(o.offeringProgramme);
                    if(o.curriculumType) types.add(o.curriculumType);
                    if(o.hours) hoursList.add(o.hours);
                    if(o.session) sessions.add(o.session);
                });
                return {
                    units: Array.from(units).sort(),
                    programmes: Array.from(programmes).sort(),
                    types: Array.from(types).sort(),
                    hours: Array.from(hoursList).sort((a,b) => parseFloat(a) - parseFloat(b)),
                    sessions: Array.from(sessions).sort()
                };
            }, [allOfferings]);

            const hasActiveSearch = searchQuery.length > 0 || Object.values(filters).some(Boolean);

            const filteredDatabase = useMemo(() => {
                if (!hasActiveSearch) return [];
                let result = allOfferings;
                const lowerQuery = searchQuery.toLowerCase();

                if (searchQuery) {
                    result = result.filter(item => 
                        String(item.code).toLowerCase().includes(lowerQuery) ||
                        String(item.title).toLowerCase().includes(lowerQuery) ||
                        String(item.teacher).toLowerCase().includes(lowerQuery) ||
                        String(item.classroom).toLowerCase().includes(lowerQuery)
                    );
                }
                if (filters.unit) result = result.filter(item => item.offeringUnit === filters.unit);
                if (filters.programme) result = result.filter(item => item.offeringProgramme === filters.programme);
                if (filters.type) result = result.filter(item => item.curriculumType === filters.type);
                if (filters.hours) result = result.filter(item => String(item.hours) === filters.hours);
                if (filters.day) result = result.filter(item => item.schedule && item.schedule.includes(filters.day));
                if (filters.session) result = result.filter(item => item.session === filters.session);
                return result; 
            }, [searchQuery, filters, allOfferings, hasActiveSearch]);

            useEffect(() => setCurrentPage(1), [searchQuery, filters]);

            const paginatedResults = useMemo(() => {
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                return filteredDatabase.slice(start, start + ITEMS_PER_PAGE);
            }, [filteredDatabase, currentPage]);

            const totalPages = Math.ceil(filteredDatabase.length / ITEMS_PER_PAGE);

            const clearFilters = () => {
                setFilters({ unit: '', programme: '', type: '', day: '', hours: '', session: '' });
                setSearchQuery('');
            };

            return (
                <div className={`transition-all duration-500 ${hasActiveSearch ? 'space-y-8' : 'min-h-[60vh] flex flex-col justify-center'}`}>
                    <div className={`bg-white border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] transition-all ${hasActiveSearch ? '' : 'max-w-3xl mx-auto w-full scale-110'}`}>
                        <h2 className="text-4xl font-black mb-4 uppercase drop-shadow-[2px_2px_0px_rgba(0,0,0,1)] text-center">
                            FIND YOUR <span className="text-[#ec4899]">TARGET</span>
                        </h2>
                        <div className="relative mb-4">
                            <input 
                                type="text" 
                                placeholder="搜索 Code / 课程名 / 老师 / 教室 ..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full bg-gray-100 border-2 border-black p-4 pl-14 font-bold text-xl focus:outline-none focus:bg-[#3b82f6] focus:text-white focus:placeholder-white transition-colors"
                            />
                            <Search className="absolute left-4 top-1/2 transform -translate-y-1/2 w-6 h-6 text-gray-500 pointer-events-none" strokeWidth={3} />
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 text-xs font-bold">
                             <select value={filters.unit} onChange={e => setFilters({...filters, unit: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Offering Unit</option>
                                {uniqueOptions.units.map(u => <option key={u} value={u}>{u}</option>)}
                             </select>
                             <select value={filters.programme} onChange={e => setFilters({...filters, programme: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Programme</option>
                                {uniqueOptions.programmes.map(p => <option key={p} value={p}>{p}</option>)}
                             </select>
                             <select value={filters.type} onChange={e => setFilters({...filters, type: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Type</option>
                                {uniqueOptions.types.map(t => <option key={t} value={t}>{t}</option>)}
                             </select>
                             <select value={filters.day} onChange={e => setFilters({...filters, day: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Day</option>
                                {['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map(d => <option key={d} value={d}>{d}</option>)}
                             </select>
                             <select value={filters.hours} onChange={e => setFilters({...filters, hours: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Hours</option>
                                {uniqueOptions.hours.map(h => <option key={h} value={h}>{h}</option>)}
                             </select>
                             <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Session</option>
                                {uniqueOptions.sessions.map(s => <option key={s} value={s}>{s}</option>)}
                             </select>
                        </div>
                        {hasActiveSearch && (
                            <div className="mt-4 flex justify-between items-center">
                                <span className="text-xs font-bold text-gray-500">Found {filteredDatabase.length} results</span>
                                <button onClick={clearFilters} className="text-xs font-bold underline hover:text-red-600 flex items-center gap-1"><X className="w-3 h-3"/> Clear Filters</button>
                            </div>
                        )}
                    </div>

                    {hasActiveSearch && (
                    <React.Fragment>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
                        {paginatedResults.length === 0 ? (
                           <div className="col-span-full text-center py-20 opacity-40">
                              <Search className="w-20 h-20 mx-auto mb-4" />
                              <p className="text-2xl font-black">NO RESULTS FOUND</p>
                           </div>
                        ) : (
                          paginatedResults.map((course, idx) => (
                            <div key={idx} className="bg-white border-4 border-black p-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 transition-all flex flex-col h-full group">
                              <div className="flex justify-between items-start mb-2">
                                <span className="bg-black text-white px-2 py-1 font-black text-lg">{course.code}</span>
                                <span className="bg-[#a3e635] border-2 border-black px-2 py-0.5 font-bold text-xs">{course.units} Units</span>
                              </div>
                              <h3 className="font-black text-xl leading-tight mb-3 min-h-[3rem]">{course.title}</h3>

                available_reminder_hours: [72, 24, 3, 1],
                email_service_configured: false,
                unsubscribed_via_link: false
            });
            const [notificationSaving, setNotificationSaving] = useState(false);
            const [notificationTesting, setNotificationTesting] = useState(false);
            const [notificationMessage, setNotificationMessage] = useState(null);
            
            // Filters & Views
            const [viewMode, setViewMode] = useState('active'); // 'active' | 'completed'

            const [filterTime, setFilterTime] = useState(''); // 'overdue' | 'today' | '3days' | '7days'

            const [newTodo, setNewTodo] = useState({ title: '', course: '', due_date: '', due_time: '', description: '' });

            useEffect(() => {
                if (user) {
                    fetchTodos();
                    fetchNotificationSettings();
                }
            }, [user]);

            const fetchTodos = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/api/todos');
                    if (res.ok) {
                        const data = await res.json();
                        setTodos(data);
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const fetchNotificationSettings = async () => {
                try {
                    const res = await fetch('/api/user/notifications');
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to load notification settings');
                    setNotificationDraft({
                        email: data.email || '',
                        enabled: Boolean(data.enabled),
                        reminder_hours: data.reminder_hours || [24, 3],
                        available_reminder_hours: data.available_reminder_hours || [72, 24, 3, 1],
                        email_service_configured: Boolean(data.email_service_configured),
                        unsubscribed_via_link: Boolean(data.unsubscribed_via_link)
                    });
                } catch (e) {
                    setNotificationMessage({ type: 'error', text: e.message });
                }
            };

            const toggleReminderHour = (hour) => {
                setNotificationDraft(prev => {
                    const exists = prev.reminder_hours.includes(hour);
                    const nextHours = exists
                        ? prev.reminder_hours.filter(item => item !== hour)
                        : [...prev.reminder_hours, hour];
                    return { ...prev, reminder_hours: nextHours.sort((a, b) => b - a) };
                });
            };

            const saveNotificationSettings = async (e) => {
                e.preventDefault();
                setNotificationSaving(true);
                setNotificationMessage(null);
                try {
                    const res = await fetch('/api/user/notifications', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            email: notificationDraft.email,
                            enabled: notificationDraft.enabled,
                            reminder_hours: notificationDraft.reminder_hours
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to save notification settings');
                    setNotificationDraft(prev => ({
                        ...prev,
                        email: data.settings.email || '',
                        enabled: Boolean(data.settings.enabled),
                        reminder_hours: data.settings.reminder_hours || [24, 3],
                        available_reminder_hours: data.settings.available_reminder_hours || prev.available_reminder_hours,
                        email_service_configured: Boolean(data.settings.email_service_configured),
                        unsubscribed_via_link: Boolean(data.settings.unsubscribed_via_link)
                    }));
                    setNotificationMessage({ type: 'success', text: '邮件通知设置已保存' });
                } catch (e) {
                    setNotificationMessage({ type: 'error', text: e.message });
                }
                setNotificationSaving(false);
            };

            const sendTestNotificationEmail = async () => {
                setNotificationTesting(true);
                setNotificationMessage(null);
                try {
                    const res = await fetch('/api/user/notifications/test', { method: 'POST' });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || 'Failed to send test email');
                    setNotificationMessage({ type: 'success', text: '测试邮件已发送，请检查邮箱' });
                } catch (e) {
                    setNotificationMessage({ type: 'error', text: e.message });
                }
                setNotificationTesting(false);
            };

            const handleSync = async () => {
                if (!user.ispace_username) {
                    alert("Please login with iSpace account first or link your account.");
                    return;
                }
                const password = prompt("Please confirm your iSpace password to sync:");
                if (!password) return;

                try {
                    const res = await fetch('/api/todos/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user.ispace_username, password })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert(`Synced ${data.added} new tasks.`);
                        fetchTodos();
                    } else if (res.status === 403) {
                        alert("当前登录用户绑定的 iSpace 账号与同步账号不一致。请退出后使用正确的 iSpace 账号重新登录，再同步 DDL。");
                    } else {
                        alert(data.error || "Sync failed");
                    }

            const handleAddTodo = async (e) => {
                e.preventDefault();
                if (!newTodo.title || !newTodo.due_date) return;
                
                // Combine date and time
                const dateStr = newTodo.due_time ? `${newTodo.due_date}T${newTodo.due_time}` : `${newTodo.due_date}T23:59`;
                
                try {
                    const res = await fetch('/api/todos/add', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: newTodo.title,
                            course: newTodo.course,
                            description: newTodo.description,
                            due_date: dateStr
                        })
                    });
                    if (res.ok) {
                        setShowAddForm(false);
                        setNewTodo({ title: '', course: '', due_date: '', due_time: '', description: '' });
                        fetchTodos();
                    } else {
                        alert("Failed to add task");

                } catch(e) { console.error(e); }

                    const res = await fetch(`/api/todos/${todo.id}/${endpoint}`, { method: 'POST' });

                } catch(e) { console.error(e); }
            };
            
            const deleteTodo = async (id) => {

                    const res = await fetch(`/api/todos/${id}`, { method: 'DELETE' });

                    result = result.filter(t => t.is_completed);

                // Filter by course

                    result = result.filter(t => t.course && t.course.toLowerCase().includes(filterCourse.toLowerCase()));

                // Filter by time

                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime() / 1000;
                    
                    if (filterTime === 'overdue') {
                         result = result.filter(t => t.due_date < (now.getTime() / 1000));

                         });
                    } else if (filterTime === '3days') {

                         result = result.filter(t => t.due_date >= today && t.due_date <= limit);
                    } else if (filterTime === '7days') {
                         const limit = today + (7 * 24 * 60 * 60);
                         result = result.filter(t => t.due_date >= today && t.due_date <= limit);
                    }
                }

                    {filteredTodos.length === 0 ? (

                    ) : (

                                    statusText = 'Completed';

                                    statusText = 'Overdue';

        const FreeClassroomView = () => {
            const initialQuery = useMemo(() => {
                const DAY_VALUES = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
                const now = new Date();
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                const upcoming = SCHOOL_PERIODS.find(p => timeToMinutes(p.start) >= currentMinutes);
                if (upcoming) {
                    return { day: DAY_VALUES[now.getDay()], start: upcoming.start, end: upcoming.end };
                }
                const nextDay = DAY_VALUES[(now.getDay() + 1) % 7];
                const first = SCHOOL_PERIODS[0];
                return { day: nextDay, start: first.start, end: first.end };
            }, []);

            const [selectedDay, setSelectedDay] = useState(initialQuery.day);
            const [startTime, setStartTime] = useState(initialQuery.start);
            const [endTime, setEndTime] = useState(initialQuery.end);
            const [buildingFilter, setBuildingFilter] = useState('ALL');
            const [roomKeyword, setRoomKeyword] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [result, setResult] = useState(null);

            const endOptions = useMemo(() => {
                return SCHOOL_PERIODS.filter(period => timeToMinutes(period.end) > timeToMinutes(startTime));
            }, [startTime]);

            useEffect(() => {
                if (timeToMinutes(endTime) <= timeToMinutes(startTime)) {
                    const firstValidEnd = endOptions[0];
                    if (firstValidEnd) setEndTime(firstValidEnd.end);
                }
            }, [startTime, endTime, endOptions]);

            useEffect(() => {
                let ignore = false;
                const params = new URLSearchParams({ day: selectedDay, start: startTime, end: endTime });

                setLoading(true);
                setError(null);

                fetchJson(`/api/free-classrooms?${params.toString()}`)
                    .then((data) => {
                        if (ignore) return;
                        setResult(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        if (ignore) return;
                        setError(err.message);
                        setLoading(false);
                    });

                return () => {
                    ignore = true;
                };
            }, [selectedDay, startTime, endTime]);

            const buildingOptions = useMemo(() => {
                if (!result) return [];
                return result.buildings.filter(item => item.total_rooms > 0);
            }, [result]);

            const filteredRooms = useMemo(() => {
                if (!result) return [];
                const keyword = roomKeyword.trim().toLowerCase();
                return result.rooms.filter(room => {
                    const byBuilding = buildingFilter === 'ALL' || room.building === buildingFilter;
                    const byKeyword = !keyword || room.room.toLowerCase().includes(keyword);
                    return byBuilding && byKeyword;
                });
            }, [result, buildingFilter, roomKeyword]);

            const groupedRooms = useMemo(() => {
                const groups = {};
                filteredRooms.forEach(room => {
                    const location = getRoomLocationMeta(room.room);

                    if (!groups[room.building]) {
                        groups[room.building] = {
                            building: room.building,
                            roomCount: 0,
                            floors: {},
                        };
                    }

                    if (!groups[room.building].floors[location.floorLabel]) {
                        groups[room.building].floors[location.floorLabel] = {
                            floorLabel: location.floorLabel,
                            floorNumber: location.floorNumber,
                            rooms: [],
                        };
                    }

                    groups[room.building].roomCount += 1;
                    groups[room.building].floors[location.floorLabel].rooms.push({
                        ...room,
                        location,
                    });
                });

                return Object.values(groups)
                    .map(group => ({
                        ...group,
                        floors: Object.values(group.floors)
                            .map(floorGroup => ({
                                ...floorGroup,

        const SettingsView = ({ user, onLogout }) => {

            const [displayName, setDisplayName] = useState(user ? (user.display_name || user.username) : '');
            const [updating, setUpdating] = useState(false);

            useEffect(() => {
                if (user) setDisplayName(user.display_name || user.username);
            }, [user]);

            const handleUpdateProfile = async () => {
                if (!displayName.trim()) {
                    alert("Display name cannot be empty");
                    return;
                }
                setUpdating(true);
                try {
                    const res = await fetch('/api/user/profile', {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ display_name: displayName })
                    });
                    if (res.ok) {
                        alert("Profile updated successfully!");
                        // Ideally we should update the parent user state, but a page refresh or re-fetch will do.
                        // For better UX, we can trigger a reload or callback.
                        window.location.reload(); 
                    } else {
                        const data = await res.json();
                        alert("Update failed: " + (data.error || "Unknown error"));
                    }
                } catch (e) {
                    alert("Network error");
                }
                setUpdating(false);

                if (!confirm("⚠️ 警告：确定要注销账号吗？\n\n这将永久删除您的：\n1. iSpace 登录信息\n2. 所有保存的 DDL/待办事项\n\n您的教师评价将保留（转为匿名）。\n此操作无法撤销！")) return;
                
                const doubleCheck = prompt("请输入 'DELETE' 确认删除账户：");
                if (doubleCheck !== 'DELETE') return;

                setDeleting(true);
                try {
                    const res = await fetch('/api/user/delete', { method: 'DELETE' });
                    if (res.ok) {
                        alert("账号已成功注销。");
                        onLogout();
                    } else {
                        const data = await res.json();
                        alert("删除失败: " + (data.error || "Unknown error"));

        // --- Auth Modal ---
        const AuthModal = ({ onClose, onLoginSuccess }) => {
            const [activeTab, setActiveTab] = useState('login'); // login, register, ispace
            const [formData, setFormData] = useState({ username: '', password: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);
                setError(null);
                
                let url = '/api/login';
                if (activeTab === 'register') url = '/api/register';
                if (activeTab === 'ispace') url = '/api/login/ispace';

                try {
                    const res = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });
                    const data = await res.json();
                    
                    if (res.ok) {
                        if (activeTab === 'register') {
                            alert("Registration successful! Please login.");
                            setActiveTab('login');
                        } else {
                            onLoginSuccess(data.user);
                            onClose();
                        }
                    } else {
                        setError(data.error || 'Operation failed');
                    }
                } catch (err) {
                    setError('Network error');
                }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">

                            <button onClick={() => setActiveTab('register')} className={`flex-1 py-2 font-bold ${activeTab === 'register' ? 'bg-black text-white' : 'hover:bg-gray-100'}`}>REGISTER</button>
                            <button onClick={() => setActiveTab('ispace')} className={`flex-1 py-2 font-bold ${activeTab === 'ispace' ? 'bg-[#3b82f6] text-white border-l-2 border-black' : 'hover:bg-gray-100 border-l-2 border-black'}`}>iSPACE</button>

                                    required 
                                    className="w-full border-2 border-black p-3 font-bold focus:bg-[#ec4899] focus:text-white focus:outline-none transition-colors"
                                    value={formData.username}
                                    onChange={e => setFormData({...formData, username: e.target.value})}
                                />
                            </div>
                            <div>
                                <label className="block text-xs font-black uppercase mb-1">Password</label>
                                <input 
                                    type="password" 
                                    required 
                                    className="w-full border-2 border-black p-3 font-bold focus:bg-[#ec4899] focus:text-white focus:outline-none transition-colors"
                                    value={formData.password}
                                    onChange={e => setFormData({...formData, password: e.target.value})}

                            </div>
                            {error && <div className="bg-red-100 border-2 border-red-500 text-red-700 p-2 text-sm font-bold text-center">{error}</div>}
                            
                            {(activeTab === 'login' || activeTab === 'register') && (

        const App = () => {
            const [currentView, setCurrentView] = useState('home');
            const [availableCourses, setAvailableCourses] = useState([]);
            const [selectedCodes, setSelectedCodes] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [viewingCourse, setViewingCourse] = useState(null);
            const [viewingTeacher, setViewingTeacher] = useState(null);
            const [startTime, setStartTime] = useState("08:00");
            const [endTime, setEndTime] = useState("22:00");
            const [blockedSlots, setBlockedSlots] = useState([]);
            const [newBlockDay, setNewBlockDay] = useState("Mon");
            const [newBlockStart, setNewBlockStart] = useState("08:00");
            const [newBlockEnd, setNewBlockEnd] = useState("10:00");
            const [optimalSchedule, setOptimalSchedule] = useState(null);
            const [isCalculating, setIsCalculating] = useState(false);
            const [loadingCourses, setLoadingCourses] = useState(true);
            const [error, setError] = useState(null);

            const [user, setUser] = useState(null);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                fetch('/api/user').then(res => res.json()).then(data => {
                    if (data.user) setUser(data.user);
                });

                fetch('/api/courses')
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) throw new Error(data.error);
                        setAvailableCourses(data);
                        setLoadingCourses(false);
                    })
                    .catch(() => {
                        setError("无法加载课程数据");
                        setLoadingCourses(false);
                    });
            }, []);

            useEffect(() => {
                if (window.location.protocol === 'file:') return;

                fetch('/api/analytics/track', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        view: currentView,
                        path: `${window.location.pathname}${window.location.hash}`,
                        referrer: document.referrer,
                    }),
                }).catch(() => {});
            }, [currentView]);

            const logout = () => {
                fetch('/api/logout', { method: 'POST' }).then(() => {
                    setUser(null);
                    setCurrentView('home');
                    setIsMenuOpen(false);
                });
            };

            const goToView = (view) => {
                setCurrentView(view);
                setIsMenuOpen(false);
            };

            const filteredCourses = useMemo(() => {
                if (!searchQuery) return [];
                return availableCourses.filter(c => 
                    String(c.code).toLowerCase().includes(searchQuery.toLowerCase()) || 
                    String(c.name).toLowerCase().includes(searchQuery.toLowerCase())
                ).slice(0, 10);
            }, [searchQuery, availableCourses]);

            const teacherCount = useMemo(() => {
                const teachers = new Set();
                availableCourses.forEach(course => {
                    (course.teachers || []).forEach(teacher => {
                        const name = String(teacher || '').trim();
                        if (name) teachers.add(name);
                    });
                });
                return teachers.size;
            }, [availableCourses]);

            const navItems = [
                { key: 'home', label: '主页', Icon: House },
                { key: 'optimizer', label: '排课', Icon: Calculator },
                { key: 'explorer', label: '课程', Icon: BookOpen },
                { key: 'classrooms', label: '空教室', Icon: Building2 },
                { key: 'ddl', label: 'DDL', Icon: CheckSquare },
                { key: 'teachers', label: '老师', Icon: UserCheck },
                { key: 'toolbox', label: '工具箱', Icon: Wrench },
                { key: 'settings', label: '设置', Icon: Settings }
            ];

            const addCourse = (course, preferredTeacher = "") => {
                const existing = selectedCodes.find(c => c.code === course.code);
                if (existing) {
                    if (preferredTeacher && existing.preferredTeacher !== preferredTeacher) {
                         updatePreferredTeacher(course.code, preferredTeacher);
                    }
                    return;
                }
                const randomColor = ['bg-pink-400', 'bg-lime-400', 'bg-cyan-400', 'bg-yellow-400', 'bg-orange-400', 'bg-purple-400', 'bg-emerald-400', 'bg-rose-400'][selectedCodes.length % 8];
                let teacherList = course.teachers || [];
                if (teacherList.length === 0 && availableCourses.length > 0) {
                     const found = availableCourses.find(ac => ac.code === course.code);
                     if (found && found.teachers) teacherList = found.teachers;
                }
                setSelectedCodes([...selectedCodes, { ...course, color: randomColor, preferredTeacher: preferredTeacher, teachers: teacherList }]);
                setSearchQuery("");
                setOptimalSchedule(null);
            };

            const updatePreferredTeacher = (code, teacher) => {
                setSelectedCodes(selectedCodes.map(c => c.code === code ? { ...c, preferredTeacher: teacher } : c));
                setOptimalSchedule(null);
            };

            const removeCourse = (code) => {
                setSelectedCodes(selectedCodes.filter(c => c.code !== code));
                setOptimalSchedule(null);
            };
            
            const addBlockedSlot = () => {
                setBlockedSlots([...blockedSlots, { day: newBlockDay, start: newBlockStart, end: newBlockEnd, id: Date.now() }]);
            };
            const removeBlockedSlot = (id) => setBlockedSlots(blockedSlots.filter(b => b.id !== id));

            const calculateOptimal = () => {
                setIsCalculating(true);
                setOptimalSchedule(null);
                const teachersMap = {};
                selectedCodes.forEach(c => { if (c.preferredTeacher) teachersMap[c.code] = c.preferredTeacher; });

                fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codes: selectedCodes.map(c => c.code), startTime, endTime, blocked: blockedSlots, teachers: teachersMap })
                })
                .then(res => res.json())
                .then(data => {
                    setIsCalculating(false);
                    if (data.error) { alert(data.error); return; }
                    if (!data.found) { alert("无法找到不冲突的组合！\n缺失课程: " + (data.missing || []).join(", ")); return; }
                    
                    const coloredCourses = data.courses.map((c) => {
                        const original = selectedCodes.find(sc => sc.code === c.code);
                        return { ...c, color: original ? original.color : 'bg-gray-400' };
                    });
                    
                    const flat = [];
                    const dayOrder = { 'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6, 'Sun': 7 };
                    coloredCourses.forEach(c => {
                        c.schedules.forEach(s => {
                            flat.push({ ...s, courseCode: c.code, courseName: c.name, teacher: c.teacher, color: c.color, id: c.id });
                        });
                    });
                    flat.sort((a, b) => {
                        if (a.day !== b.day) return dayOrder[a.day] - dayOrder[b.day];
                        return a.start.localeCompare(b.start);
                    });
                    setOptimalSchedule({ courses: coloredCourses, flatSchedule: flat, totalUnits: data.totalUnits });
                })
                .catch(err => { setIsCalculating(false); alert("计算请求失败: " + err.message); });
            };

            return (
                <div className="min-h-screen bg-transparent font-sans selection:bg-[#1a140d] selection:text-[#fbf5ec] pb-8">
                    <nav className="sticky top-0 z-50 border-b border-[#1a140d]/15 bg-[rgba(250,244,234,0.92)] backdrop-blur-sm">
                        <div className="max-w-6xl mx-auto px-6 md:px-10 py-5 flex justify-between items-baseline relative gap-6">
                            <div className="flex items-baseline gap-8 min-w-0">

                                        Maxcourse
                                    </span>
                                    <span className="mono-ui hidden md:block text-[10px] uppercase tracking-[0.28em] text-[#8a7666] mt-0.5">
                                        Campus Toolkit
                                    </span>
                                </button>

                                <div className="hidden lg:flex items-baseline gap-7">
                                    {navItems.map((item) => {
                                        const isActive = currentView === item.key;
                                        return (
                                            <button
                                                key={item.key}
                                                onClick={() => goToView(item.key)}
                                                className={`book-serif text-base relative pb-1 transition-colors ${
                                                    isActive
                                                        ? 'text-[#1a140d] border-b border-[#1a140d]'
                                                        : 'text-[#7a6a5d] border-b border-transparent hover:text-[#1a140d] hover:border-[#1a140d]/40'
                                                }`}
                                            >
                                                {item.label}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>

                            <div className="flex items-baseline gap-5">
                                {user ? (
                                    <div className="hidden md:flex items-baseline gap-2">
                                        <span className="mono-ui text-[10px] uppercase tracking-[0.24em] text-[#8a7666]">Reader</span>
                                        <span className="book-serif italic text-[#1a140d] max-w-[11rem] truncate">{user.display_name || user.username}</span>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowAuthModal(true)} className="hidden md:inline book-serif text-[#1a140d] border-b border-[#1a140d]/50 hover:border-[#1a140d] pb-0.5 transition-colors">
                                        登录
                                    </button>
                                )}

                                {user && (
                                    <button onClick={logout} className="hidden md:inline book-serif italic text-[#7a6a5d] border-b border-transparent hover:text-[#1a140d] hover:border-[#1a140d]/40 pb-0.5 transition-colors" title="Logout">
                                        退出
                                    </button>
                                )}

                                <div className="lg:hidden relative z-50">
                                    <button
                                        className="book-serif flex items-baseline gap-2 text-[#1a140d] border-b border-[#1a140d]/40 hover:border-[#1a140d] pb-0.5 transition-colors"
                                        onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    >
                                        目录
                                    </button>
                                    <div className={`absolute right-0 top-full mt-4 w-60 ${isMenuOpen ? 'block' : 'hidden'}`}>
                                        <div className="bg-[#fbf5ec] border border-[#1a140d]/20 overflow-hidden">
                                            {navItems.map((item, idx) => {
                                                const isActive = currentView === item.key;
                                                return (
                                                    <button
                                                        key={item.key}
                                                        onClick={() => goToView(item.key)}
                                                        className={`book-serif w-full text-left px-5 py-3 flex items-baseline gap-3 ${idx > 0 ? 'border-t border-[#1a140d]/10' : ''} ${
                                                            isActive ? 'text-[#1a140d] bg-[#1a140d]/5' : 'text-[#3d3025] hover:bg-[#1a140d]/[0.025]'
                                                        }`}
                                                    >
                                                        <span className="book-serif italic text-[#a08c7d] text-sm w-6">{toRoman(idx + 1)}.</span>
                                                        <span>{item.label}</span>
                                                    </button>
                                                );
                                            })}
                                            {!user ? (
                                                <button onClick={() => { setShowAuthModal(true); setIsMenuOpen(false); }} className="book-serif italic w-full text-left px-5 py-3 text-[#3d3025] border-t border-[#1a140d]/20 hover:bg-[#1a140d]/[0.025]">
                                                    登录
                                                </button>
                                            ) : (
                                                <button onClick={logout} className="book-serif italic w-full text-left px-5 py-3 text-[#3d3025] border-t border-[#1a140d]/20 hover:bg-[#1a140d]/[0.025]">
                                                    退出
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {currentView === 'home' ? (
                        <HomeView
                            user={user}
                            availableCourses={availableCourses}
                            teacherCount={teacherCount}
                            selectedCount={selectedCodes.length}
                            onNavigate={goToView}
                            onOpenLogin={() => setShowAuthModal(true)}
                        />
                    ) : currentView === 'explorer' ? (
                        <div className="max-w-6xl mx-auto px-4 md:px-8 mt-8">
                             <ExplorerView 
                                availableCourses={availableCourses} 
                                onAddCourse={addCourse} 
                                switchToOptimizer={() => goToView('optimizer')} 
                                onViewTeacher={(name) => setViewingTeacher(name)}
                             />
                        </div>
                    ) : currentView === 'teachers' ? (
                        <TeacherListView onViewTeacher={(name) => setViewingTeacher(name)} />
                    ) : currentView === 'classrooms' ? (
                        <FreeClassroomView />
                    ) : currentView === 'ddl' ? (
                        <DDLView user={user} onLoginRequest={() => setShowAuthModal(true)} />
                    ) : currentView === 'toolbox' ? (
                        <ToolboxView />
                    ) : currentView === 'settings' ? (
                        <SettingsView user={user} onLogout={() => { setUser(null); goToView('home'); }} />
                    ) : (
                        <React.Fragment>
                        <header className="mb-10 text-center mt-8">
                            <h1 className="text-5xl md:text-7xl font-black text-black tracking-tighter uppercase mb-4 drop-shadow-[4px_4px_0px_rgba(0,0,0,1)]">
                                SCHEDULER<span className="text-[#ec4899]">MAX</span>
                            </h1>
                            <p className="text-xl font-bold text-gray-800 bg-[#a3e635] inline-block px-4 py-1 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] rotate-[-2deg]">
                                智能排课 · 自动优化
                            </p>
                        </header>

                        <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 px-4">
                            <div className="lg:col-span-5 space-y-8">
                                <div className="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 relative overflow-visible z-20">
                                    <div className="absolute top-0 right-0 bg-black text-white px-3 py-1 font-bold text-sm">STEP 01</div>
                                    <h2 className="text-2xl font-black mb-6 flex items-center gap-2"><BookOpen className="w-6 h-6" /> 选择课程</h2>
                                    <div className="relative">
                                        <label className="block font-bold mb-1 text-xs uppercase flex items-center gap-1"><Tag className="w-3 h-3"/> Search Course Code/Name</label>
                                        <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-gray-100 border-2 border-black p-2 font-bold focus:outline-none focus:bg-[#3b82f6] focus:text-white transition-colors uppercase" placeholder="e.g. ACCT4043" disabled={loadingCourses} />
                                        {loadingCourses && <div className="text-xs text-gray-500 mt-1">正在读取Excel数据...</div>}
                                        {searchQuery && filteredCourses.length > 0 && (
                                            <div className="absolute top-full left-0 w-full bg-white border-2 border-black border-t-0 shadow-lg max-h-60 overflow-y-auto z-50">
                                                {filteredCourses.map(c => (
                                                    <div key={c.code} onClick={() => addCourse(c)} className="p-2 hover:bg-gray-100 cursor-pointer border-b border-gray-100 last:border-0">
                                                        <div className="font-bold text-sm">{c.code}</div>
                                                        <div className="text-xs text-gray-600 truncate">{c.name}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-[#e5e7eb] border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xl font-black flex items-center gap-2"><Clock className="w-6 h-6" /> 待排课程 ({selectedCodes.length})</h2>
                                        {selectedCodes.length > 0 && <button onClick={() => setSelectedCodes([])} className="text-xs font-bold underline hover:text-red-600">清空</button>}
                                    </div>
                                    <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                        {selectedCodes.length === 0 ? (
                                            <div className="text-center py-10 text-gray-500 font-bold italic border-2 border-dashed border-gray-400">请从上方添加课程...</div>
                                        ) : (
                                            selectedCodes.map(course => (
                                                <div key={course.code} className={`relative group border-2 border-black p-3 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-transform hover:-translate-y-1 bg-white`}>
                                                    <div className={`absolute top-0 left-0 w-2 h-full ${course.color} border-r-2 border-black`}></div>
                                                    <div className="pl-4 flex-1">
                                                        <div className="flex justify-between items-start w-full">
                                                            <span className="font-bold text-xs bg-black text-white px-1 mb-1 inline-block">{course.code}</span>
                                                            <div className="flex gap-2">
                                                                <button className="text-black opacity-40 hover:opacity-100 hover:text-blue-600 transition-opacity" onClick={(e) => { e.stopPropagation(); setViewingCourse(course); }} title="View Details"><Info className="w-4 h-4" /></button>
                                                                <button className="text-black opacity-20 group-hover:opacity-100 group-hover:text-red-600 transition-opacity" onClick={(e) => { e.stopPropagation(); removeCourse(course.code); }}><Trash2 className="w-4 h-4" /></button>
                                                            </div>
                                                        </div>
                                                        <h3 className="font-black text-lg leading-tight truncate pr-4">{course.name}</h3>
                                                        <div className="mt-2">
                                                            <select className="w-full text-xs border border-gray-300 rounded p-1 bg-gray-50 focus:outline-none focus:border-black" value={course.preferredTeacher} onChange={(e) => updatePreferredTeacher(course.code, e.target.value)}>
                                                                <option value="">Any Teacher</option>
                                                                {course.teachers && course.teachers.map((t, idx) => <option key={idx} value={t}>{t}</option>)}
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 relative">
                                    <div className="absolute top-0 right-0 bg-black text-white px-3 py-1 font-bold text-sm">STEP 02</div>
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-2"><Clock className="w-6 h-6" /> 时间限制</h2>
                                    <div className="p-4 mb-6 rounded-lg border-2 border-black/10 inline-block text-left w-full bg-gray-50">
                                        <div className="text-black font-bold mb-2 text-sm uppercase">Global Time Range</div>
                                        <div className="flex gap-4 items-center mb-4">
                                            <div><label className="block text-xs font-bold text-black mb-1">Earliest</label><input type="time" value={startTime} onChange={(e) => setStartTime(e.target.value)} className="bg-white border-2 border-black px-2 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] w-full"/></div>
                                            <div className="font-black">-</div>
                                            <div><label className="block text-xs font-bold text-black mb-1">Latest</label><input type="time" value={endTime} onChange={(e) => setEndTime(e.target.value)} className="bg-white border-2 border-black px-2 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] w-full"/></div>
                                        </div>
                                        <div className="border-t border-black/10 my-4"></div>
                                        <div className="text-black font-bold mb-2 text-sm uppercase">Blocked Slots</div>
                                        <div className="flex gap-2 items-end mb-3">
                                            <div className="flex-1">
                                                <select value={newBlockDay} onChange={(e) => setNewBlockDay(e.target.value)} className="bg-white border-2 border-black px-2 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] h-[34px] w-full">
                                                    {['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map(d => <option key={d} value={d}>{d}</option>)}
                                                </select>
                                            </div>
                                            <div className="w-24"><input type="time" value={newBlockStart} onChange={(e) => setNewBlockStart(e.target.value)} className="bg-white border-2 border-black px-1 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] h-[34px] w-full text-sm"/></div>
                                            <div className="w-24"><input type="time" value={newBlockEnd} onChange={(e) => setNewBlockEnd(e.target.value)} className="bg-white border-2 border-black px-1 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] h-[34px] w-full text-sm"/></div>
                                            <button onClick={addBlockedSlot} className="bg-black text-white px-3 h-[34px] font-bold border-2 border-white shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-[2px] active:shadow-none shrink-0"><Plus className="w-4 h-4" /></button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {blockedSlots.map(b => (
                                                <div key={b.id} className="bg-red-100 border border-red-500 text-red-700 px-2 py-1 text-xs font-bold flex items-center gap-1 rounded">
                                                    <span>{b.day} {b.start}-{b.end}</span>
                                                    <button onClick={() => removeBlockedSlot(b.id)} className="hover:text-red-900"><X className="w-3 h-3" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-7 flex flex-col gap-8">
                                <div className="bg-[#3b82f6] border-4 border-black p-8 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center">
                                    <h2 className="text-3xl font-black text-white mb-2 drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">开始计算</h2>
                                    <p className="font-bold text-black mb-6">系统将自动尝试所有Session组合以避免时间冲突</p>
                                    <button onClick={calculateOptimal} disabled={selectedCodes.length === 0 || isCalculating} className="bg-[#a3e635] text-black font-black text-2xl py-6 px-12 border-4 border-black hover:shadow-[8px_8px_0px_0px_rgba(255,255,255,1)] hover:-translate-y-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3 mx-auto w-full md:w-auto">
                                        {isCalculating ? <React.Fragment><RefreshCcw className="animate-spin w-8 h-8" /> 计算中...</React.Fragment> : <React.Fragment><Calculator className="w-8 h-8" /> 计算最优课表</React.Fragment>}
                                    </button>
                                </div>

                                <div className="flex-1 bg-black border-4 border-black shadow-[8px_8px_0px_0px_rgba(100,100,100,1)] p-6 md:p-8 min-h-[400px] relative">
                                    <div className="absolute top-0 right-0 bg-[#ec4899] text-white px-3 py-1 font-bold text-sm z-10 border-l-4 border-b-4 border-black">RESULT</div>
                                    {!optimalSchedule ? (
                                        <div className="h-full flex flex-col items-center justify-center text-[#333]">
                                            <Award className="w-24 h-24 mb-4 text-[#333]" />
                                            <p className="text-2xl font-black text-white opacity-20">等待计算结果...</p>
                                        </div>
                                    ) : (
                                        <div className="animate-fade-in">
                                            <div className="flex flex-col md:flex-row justify-between items-end mb-8 border-b-4 border-white pb-4 gap-4">
                                                <div><h2 className="text-4xl font-black text-white mb-2">最佳方案</h2><p className="text-gray-400 font-bold">成功排入 {optimalSchedule.courses.length} 门课程</p></div>
                                                <div className="bg-[#ec4899] text-white p-4 border-2 border-white shadow-[4px_4px_0px_0px_#fff] rotate-1"><span className="block text-sm font-bold uppercase">Total Units</span><span className="block text-5xl font-black">{optimalSchedule.totalUnits}</span></div>
                                            </div>
                                            <div className="grid gap-4">
                                                {optimalSchedule.flatSchedule.map((slot, idx) => (
                                                    <div key={`${slot.id}-${idx}`} className="bg-white border-4 border-transparent hover:border-[#a3e635] p-4 flex flex-col md:flex-row justify-between items-center transition-all">
                                                        <div className="flex items-center gap-4 w-full md:w-auto">
                                                            <div className={`w-3 h-full self-stretch ${slot.color} border-r-2 border-black mr-2 hidden md:block`}></div>
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1"><span className="bg-black text-white text-xs font-bold px-1.5 py-0.5">{slot.courseCode}</span>{slot.teacher && <span className="text-xs font-bold text-gray-500">{slot.teacher}</span>}</div>
                                                                <h3 className="font-black text-xl leading-tight">{slot.courseName}</h3>
                                                                <div className="flex gap-3 text-sm font-bold mt-1 text-gray-700">
                                                                    <span className="bg-gray-200 px-2 py-0.5 rounded-sm flex items-center gap-1"><Calendar className="w-3 h-3"/> {slot.day}</span>
                                                                    <span className="bg-gray-200 px-2 py-0.5 rounded-sm flex items-center gap-1"><Clock className="w-3 h-3"/> {slot.start} - {slot.end}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        </React.Fragment>
                    )}

                    {viewingCourse && <CourseDetailsModal course={viewingCourse} onClose={() => setViewingCourse(null)} />}
                    {viewingTeacher && <TeacherProfileModal teacherName={viewingTeacher} onClose={() => setViewingTeacher(null)} />}
                    {showAuthModal && <AuthModal onClose={() => setShowAuthModal(false)} onLoginSuccess={setUser} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
