                                    <h2 className="mt-4 text-3xl md:text-4xl font-bold tracking-[-0.05em] text-[#101820]">
                                        {loading ? '正在读取空闲教室...' : error ? '查询失败' : `找到 ${filteredRooms.length} 间当前可用教室`}
                                    </h2>
                                    <p className="mt-3 text-base leading-relaxed text-black/62">
                                        结果只显示整个查询时间段内都没有课程冲突的房间。联合教室会拆开占用判断，避免误报。
                                    </p>
                                </div>

                                <div className="grid grid-cols-3 gap-3">
                                    <div className="rounded-[22px] bg-white/80 border border-black/10 px-4 py-4 min-w-[110px]">
                                        <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Free</div>
                                        <div className="mt-2 text-3xl font-bold tracking-[-0.05em] text-[#101820]">{result ? result.summary.free_rooms : '--'}</div>
                                    </div>
                                    <div className="rounded-[22px] bg-white/80 border border-black/10 px-4 py-4 min-w-[110px]">
                                        <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Occupied</div>
                                        <div className="mt-2 text-3xl font-bold tracking-[-0.05em] text-[#101820]">{result ? result.summary.occupied_rooms : '--'}</div>
                                    </div>
                                    <div className="rounded-[22px] bg-white/80 border border-black/10 px-4 py-4 min-w-[110px]">
                                        <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Inventory</div>
                                        <div className="mt-2 text-3xl font-bold tracking-[-0.05em] text-[#101820]">{result ? result.summary.total_rooms : '--'}</div>
                                    </div>
                                </div>
                            </div>

                            <div className="bg-white/75 backdrop-blur-sm border border-black/10 rounded-[28px] p-5 md:p-6">
                                <div className="grid md:grid-cols-[minmax(0,1fr)_220px_220px] gap-4">
                                    <div>
                                        <label className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Room Search</label>
                                        <input
                                            type="text"
                                            value={roomKeyword}
                                            onChange={(e) => setRoomKeyword(e.target.value)}
                                            placeholder="筛选房间号，例如 T4 或 603"
                                            className="mt-2 w-full rounded-2xl border border-black/10 bg-[#fbf8f2] px-4 py-3 font-bold text-[#101820] focus:outline-none focus:border-[#101820]"
                                        />
                                    </div>
                                    <div>
                                        <label className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Building</label>
                                        <select value={buildingFilter} onChange={(e) => setBuildingFilter(e.target.value)} className="mt-2 w-full rounded-2xl border border-black/10 bg-[#fbf8f2] px-4 py-3 font-bold text-[#101820] focus:outline-none focus:border-[#101820]">
                                            <option value="ALL">全部教学楼</option>
                                            {buildingOptions.map(item => (
                                                <option key={item.building} value={item.building}>
                                                    {item.building} · {item.free_rooms}/{item.total_rooms}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    <div className="rounded-2xl border border-black/10 bg-[#fbf8f2] px-4 py-3">
                                        <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Rule</div>
                                        <div className="mt-2 font-bold text-[#101820]">只返回整段空闲房间</div>
                                        <div className="mt-1 text-sm text-black/55">不是“某个片段空一下”，而是整个查询窗口都空着。</div>
                                    </div>
                                </div>
                            </div>

                            {loading ? (
                                <div className="rounded-[28px] bg-white/70 border border-black/10 px-6 py-16 text-center">
                                    <Loader2 className="w-10 h-10 mx-auto animate-spin text-[#101820]" />
                                    <p className="mt-4 font-bold text-black/55">正在计算空闲教室...</p>
                                </div>
                            ) : error ? (
                                <div className="rounded-[28px] bg-red-50 border border-red-200 px-6 py-8">
                                    <div className="font-black text-red-600 text-xl">查询失败</div>
                                    <p className="mt-2 text-red-700 font-bold">{error}</p>
                                </div>
                            ) : groupedRooms.length === 0 ? (
                                <div className="rounded-[28px] bg-white/70 border border-black/10 px-6 py-16 text-center">
                                    <Building2 className="w-12 h-12 mx-auto text-black/35" />
                                    <p className="mt-4 text-2xl font-bold text-[#101820]">这个时段没有符合条件的空教室</p>
                                    <p className="mt-2 text-black/55">换一个时间段、楼栋或者搜索条件试试。</p>
                                </div>
                            ) : (
                                <div className="space-y-5">
                                    {groupedRooms.map(([building, rooms]) => (
                                        <section key={building} className="rounded-[28px] overflow-hidden bg-white/80 border border-black/10">
                                            <div className="px-6 py-4 border-b border-black/10 flex items-center justify-between gap-4">
                                                <div>
                                                    <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/42">Building</div>
                                                    <h3 className="mt-1 text-2xl font-bold tracking-[-0.05em] text-[#101820]">{building}</h3>
                                                </div>
                                                <div className="text-right">
                                                    <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/42">Free Rooms</div>
                                                    <div className="mt-1 text-2xl font-bold tracking-[-0.05em] text-[#101820]">{rooms.length}</div>
                                                </div>
                                            </div>
                                            <div className="grid md:grid-cols-2 xl:grid-cols-3 gap-px bg-black/6">
                                                {rooms.map(room => (
                                                    <div key={room.room} className="bg-white px-5 py-5">
                                                        <div className="flex items-start justify-between gap-3">
                                                            <div>
                                                                <div className="text-2xl font-bold tracking-[-0.05em] text-[#101820]">{room.room}</div>
                                                                <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/42 mt-1">{room.building}</div>
                                                            </div>
                                                            <div className="rounded-full bg-[#d6ff62] px-3 py-1 text-xs font-black text-[#101820]">
                                                                空闲至 {room.free_until}
                                                            </div>
                                                        </div>

                                                        <div className="mt-5 space-y-3 text-sm">
                                                            {room.next_busy ? (
                                                                <div className="rounded-2xl bg-[#fbf8f2] border border-black/8 px-4 py-3">
                                                                    <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Next Class</div>
                                                                    <div className="mt-2 font-bold text-[#101820]">
                                                                        {room.next_busy.start} - {room.next_busy.end}
                                                                    </div>
                                                                    <div className="mt-1 text-black/62">
                                                                        {room.next_busy.course_code} {room.next_busy.title}
                                                                    </div>
                                                                </div>
                                                            ) : (
                                                                <div className="rounded-2xl bg-[#101820] text-white px-4 py-3">
                                                                    <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-white/45">Status</div>
                                                                    <div className="mt-2 font-bold">今天后续没有排课</div>
                                                                </div>
                                                            )}

                                                            {room.previous_busy && (
                                                                <div className="text-black/52">
                                                                    上一节课结束于 {room.previous_busy.end} · {room.previous_busy.course_code}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </section>
                                    ))}
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        };

        // --- Teacher List View ---
        const TeacherListView = ({ onViewTeacher }) => {
            const [teachers, setTeachers] = useState([]);
            const [loading, setLoading] = useState(true);
            const [search, setSearch] = useState("");

            useEffect(() => {
                fetch('/api/teachers')
                    .then(res => res.json())
                    .then(data => {
                        setTeachers(data);
                        setLoading(false);
                    })
                    .catch(e => setLoading(false));
            }, []);

            const filteredTeachers = teachers.filter(t => 
                t.name.toLowerCase().includes(search.toLowerCase())
            );

            return (
                <div className="max-w-6xl mx-auto px-4 mt-8">
                    <header className="mb-8 border-b-4 border-black pb-4 flex flex-col md:flex-row justify-between items-end gap-4">
                        <h1 className="text-4xl font-black uppercase mb-1 flex items-center gap-3">
                            <UserCheck className="w-10 h-10" /> Teacher Ratings
                        </h1>
                        <div className="relative w-full md:w-64">
                            <input 
                                type="text" 
                                placeholder="Search Teachers..." 
                                value={search}
                                onChange={e => setSearch(e.target.value)}
                                className="w-full bg-white border-2 border-black p-2 pl-10 font-bold focus:outline-none focus:bg-[#a3e635] transition-colors"
                            />
                            <Search className="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-500 pointer-events-none" />
                        </div>
                    </header>

                    {loading ? (
                        <div className="flex justify-center py-20"><Loader2 className="w-12 h-12 animate-spin" /></div>
                    ) : filteredTeachers.length === 0 ? (
                        <div className="text-center py-20 font-bold text-gray-500">No teachers found.</div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 pb-8">
                            {filteredTeachers.map((t, idx) => (
                                <div 
                                    key={idx} 
                                    onClick={() => onViewTeacher(t.name)}
                                    className="bg-white border-4 border-black p-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 transition-all cursor-pointer group flex flex-col"
                                >
                                    <h3 className="text-xl font-black mb-3 truncate group-hover:text-blue-600 transition-colors">{t.name}</h3>
                                    
                                    <div className="flex justify-between items-center mt-auto">
                                        <div className="flex items-center gap-2">
                                            <div className={`px-2 py-1 font-black text-sm border-2 border-black ${t.rating_count > 0 ? (t.average_rating >= 4 ? 'bg-[#a3e635]' : t.average_rating >= 3 ? 'bg-blue-200' : 'bg-yellow-200') : 'bg-gray-100 text-gray-500'}`}>
                                                {t.rating_count > 0 ? t.average_rating.toFixed(1) : "N/A"}
                                            </div>
                                            <span className="text-xs font-bold text-gray-500">{t.rating_count} ratings</span>
                                        </div>
                                        <span className="text-xs font-bold bg-black text-white px-2 py-1">{t.course_count} Courses</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>

                            </div>
                            <div>
                                <label className="block text-xs font-black uppercase mb-1">Password</label>
                                <input 
                                    type="password" 
                                    required 
                                    className="w-full border-2 border-black p-3 font-bold focus:bg-[#ec4899] focus:text-white focus:outline-none transition-colors"
                                    value={formData.password}
                                    onChange={e => setFormData({...formData, password: e.target.value})}
                                />
                            </div>
                            {error && <div className="bg-red-100 border-2 border-red-500 text-red-700 p-2 text-sm font-bold text-center">{error}</div>}
                            
                            {(activeTab === 'login' || activeTab === 'register') && (
                                <button 
                                    type="button"
                                    onClick={() => setActiveTab('ispace')}
                                    className="w-full bg-[#3b82f6] text-white font-bold py-3 rounded-full border-2 border-black hover:bg-blue-600 hover:scale-105 transition-all mb-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none flex justify-center items-center gap-2"
                                >
                                    <Globe className="w-5 h-5" /> Login with iSpace
                                </button>
                            )}

                            <button disabled={loading} className="w-full bg-black text-white font-black py-4 text-xl border-2 border-black hover:shadow-[4px_4px_0px_0px_rgba(255,255,255,1)] hover:-translate-y-1 transition-all flex justify-center items-center gap-2">
                                {loading ? <Loader2 className="animate-spin" /> : 'SUBMIT'}
                            </button>
                        </form>
                        
                        {activeTab === 'ispace' && (
                            <p className="mt-4 text-xs text-gray-500 font-bold text-center">
                                * Using iSpace login will automatically sync your deadlines and create an account if you don't have one.
                            </p>
                        )}
                    </div>
                </div>
            );
        };

        const App = () => {
            const [currentView, setCurrentView] = useState('home');
            const [availableCourses, setAvailableCourses] = useState([]);
            const [selectedCodes, setSelectedCodes] = useState([]);
            const [searchQuery, setSearchQuery] = useState("");
            const [viewingCourse, setViewingCourse] = useState(null);
            const [viewingTeacher, setViewingTeacher] = useState(null);
            const [startTime, setStartTime] = useState("08:00");
            const [endTime, setEndTime] = useState("22:00");
            const [blockedSlots, setBlockedSlots] = useState([]);
            const [newBlockDay, setNewBlockDay] = useState("Mon");
            const [newBlockStart, setNewBlockStart] = useState("08:00");
            const [newBlockEnd, setNewBlockEnd] = useState("10:00");
            const [optimalSchedule, setOptimalSchedule] = useState(null);
            const [isCalculating, setIsCalculating] = useState(false);
            const [loadingCourses, setLoadingCourses] = useState(true);
            const [error, setError] = useState(null);

            const [user, setUser] = useState(null);
            const [showAuthModal, setShowAuthModal] = useState(false);
            const [isMenuOpen, setIsMenuOpen] = useState(false);

            useEffect(() => {
                fetch('/api/user').then(res => res.json()).then(data => {
                    if (data.user) setUser(data.user);
                });

                fetch('/api/courses')
                    .then(res => res.json())
                    .then(data => {
                        if (data.error) throw new Error(data.error);
                        setAvailableCourses(data);
                        setLoadingCourses(false);
                    })
                    .catch(() => {
                        setError("无法加载课程数据");
                        setLoadingCourses(false);
                    });
            }, []);

            const logout = () => {
                fetch('/api/logout', { method: 'POST' }).then(() => {
                    setUser(null);
                    setCurrentView('home');
                    setIsMenuOpen(false);
                });
            };

            const goToView = (view) => {
                setCurrentView(view);
                setIsMenuOpen(false);
            };

            const filteredCourses = useMemo(() => {
                if (!searchQuery) return [];
                return availableCourses.filter(c => 
                    String(c.code).toLowerCase().includes(searchQuery.toLowerCase()) || 
                    String(c.name).toLowerCase().includes(searchQuery.toLowerCase())
                ).slice(0, 10);
            }, [searchQuery, availableCourses]);

            const teacherCount = useMemo(() => {
                const teachers = new Set();
                availableCourses.forEach(course => {
                    (course.teachers || []).forEach(teacher => {
                        const name = String(teacher || '').trim();
                        if (name) teachers.add(name);
                    });
                });
                return teachers.size;
            }, [availableCourses]);

            const navItems = [
                { key: 'home', label: '主页', Icon: House },
                { key: 'optimizer', label: '排课', Icon: Calculator },
                { key: 'explorer', label: '课程', Icon: BookOpen },
                { key: 'classrooms', label: '空教室', Icon: Building2 },
                { key: 'ddl', label: 'DDL', Icon: CheckSquare },
                { key: 'teachers', label: '老师', Icon: UserCheck },
                { key: 'settings', label: '设置', Icon: Settings }
            ];

            const addCourse = (course, preferredTeacher = "") => {
                const existing = selectedCodes.find(c => c.code === course.code);
                if (existing) {
                    if (preferredTeacher && existing.preferredTeacher !== preferredTeacher) {
                         updatePreferredTeacher(course.code, preferredTeacher);
                    }
                    return;
                }
                const randomColor = ['bg-pink-400', 'bg-lime-400', 'bg-cyan-400', 'bg-yellow-400', 'bg-orange-400', 'bg-purple-400', 'bg-emerald-400', 'bg-rose-400'][selectedCodes.length % 8];
                let teacherList = course.teachers || [];
                if (teacherList.length === 0 && availableCourses.length > 0) {
                     const found = availableCourses.find(ac => ac.code === course.code);
                     if (found && found.teachers) teacherList = found.teachers;
                }
                setSelectedCodes([...selectedCodes, { ...course, color: randomColor, preferredTeacher: preferredTeacher, teachers: teacherList }]);
                setSearchQuery("");
                setOptimalSchedule(null);
            };

            const updatePreferredTeacher = (code, teacher) => {
                setSelectedCodes(selectedCodes.map(c => c.code === code ? { ...c, preferredTeacher: teacher } : c));
                setOptimalSchedule(null);
            };

            const removeCourse = (code) => {
                setSelectedCodes(selectedCodes.filter(c => c.code !== code));
                setOptimalSchedule(null);
            };
            
            const addBlockedSlot = () => {
                setBlockedSlots([...blockedSlots, { day: newBlockDay, start: newBlockStart, end: newBlockEnd, id: Date.now() }]);
            };
            const removeBlockedSlot = (id) => setBlockedSlots(blockedSlots.filter(b => b.id !== id));

            const calculateOptimal = () => {
                setIsCalculating(true);
                setOptimalSchedule(null);
                const teachersMap = {};
                selectedCodes.forEach(c => { if (c.preferredTeacher) teachersMap[c.code] = c.preferredTeacher; });

                fetch('/api/optimize', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ codes: selectedCodes.map(c => c.code), startTime, endTime, blocked: blockedSlots, teachers: teachersMap })
                })
                .then(res => res.json())
                .then(data => {
                    setIsCalculating(false);
                    if (data.error) { alert(data.error); return; }
                    if (!data.found) { alert("无法找到不冲突的组合！\n缺失课程: " + (data.missing || []).join(", ")); return; }
                    
                    const coloredCourses = data.courses.map((c) => {
                        const original = selectedCodes.find(sc => sc.code === c.code);
                        return { ...c, color: original ? original.color : 'bg-gray-400' };
                    });
                    
                    const flat = [];
                    const dayOrder = { 'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6, 'Sun': 7 };
                    coloredCourses.forEach(c => {
                        c.schedules.forEach(s => {
                            flat.push({ ...s, courseCode: c.code, courseName: c.name, teacher: c.teacher, color: c.color, id: c.id });
                        });
                    });
                    flat.sort((a, b) => {
                        if (a.day !== b.day) return dayOrder[a.day] - dayOrder[b.day];
                        return a.start.localeCompare(b.start);
                    });
                    setOptimalSchedule({ courses: coloredCourses, flatSchedule: flat, totalUnits: data.totalUnits });
                })
                .catch(err => { setIsCalculating(false); alert("计算请求失败: " + err.message); });
            };

            return (
                <div className="min-h-screen bg-transparent font-sans selection:bg-[#101820] selection:text-[#d6ff62] pb-8">
                    <nav className="sticky top-0 z-50 border-b border-black/10 bg-[rgba(251,248,242,0.78)] backdrop-blur-xl">
                        <div className="max-w-7xl mx-auto px-4 md:px-8 xl:px-12 py-4 flex justify-between items-center relative gap-4">
                            <div className="flex items-center gap-4 min-w-0">
                                <button className="text-left shrink-0" onClick={() => goToView('home')}>
                                    <span className="block text-2xl font-black tracking-[-0.08em] uppercase text-[#101820]">
                                        MAX<span className="text-[#ff7a1f]">COURSE</span>
                                    </span>
                                    <span className="mono-ui hidden md:block text-[11px] uppercase tracking-[0.18em] text-black/44">
                                        Campus Toolkit
                                    </span>
                                </button>

                                <div className="hidden lg:flex items-center gap-1 rounded-full border border-black/10 bg-white/70 p-1">
                                    {navItems.map((item) => {
                                        const isActive = currentView === item.key;
                                        return (
                                            <button
                                                key={item.key}
                                                onClick={() => goToView(item.key)}
                                                className={`px-4 py-2 rounded-full font-bold text-sm transition-colors ${
                                                    isActive
                                                        ? 'bg-[#101820] text-white'
                                                        : 'text-[#101820] hover:bg-white'
                                                }`}
                                            >
                                                {item.label}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {user ? (
                                    <div className="hidden md:flex items-center gap-2 rounded-full border border-black/10 bg-white/70 px-3 py-2">
                                        <span className="mono-ui text-[11px] uppercase tracking-[0.18em] text-black/40">Session</span>
                                        <span className="font-bold text-[#101820] max-w-[11rem] truncate">{user.display_name || user.username}</span>
                                    </div>
                                ) : (
                                    <button onClick={() => setShowAuthModal(true)} className="hidden md:flex items-center gap-2 rounded-full border border-black/10 bg-white/70 px-4 py-2 font-bold text-[#101820] hover:bg-white transition-colors">
                                        <LogIn className="w-4 h-4" /> 登录
                                    </button>
                                )}

                                {user && (
                                    <button onClick={logout} className="hidden md:flex items-center gap-2 rounded-full border border-black/10 bg-white/70 px-4 py-2 font-bold text-[#101820] hover:bg-white transition-colors" title="Logout">
                                        <LogOut className="w-4 h-4" /> 退出
                                    </button>
                                )}

                                <div className="lg:hidden relative z-50">
                                    <button 
                                        className="flex items-center gap-2 font-bold bg-[#101820] text-white px-4 py-2 rounded-full transition-colors hover:bg-black"
                                        onClick={() => setIsMenuOpen(!isMenuOpen)}
                                    >
                                        <Menu className="w-4 h-4" /> MENU
                                    </button>
                                    <div className={`absolute right-0 top-full mt-3 w-56 ${isMenuOpen ? 'block' : 'hidden'}`}>
                                        <div className="bg-white border border-black/10 shadow-[0_20px_50px_rgba(16,24,32,0.18)] rounded-3xl overflow-hidden">
                                            {navItems.map((item) => {
                                                const ItemIcon = item.Icon;
                                                return (
                                                    <button
                                                        key={item.key}
                                                        onClick={() => goToView(item.key)}
                                                        className={`w-full text-left px-4 py-3 font-bold flex items-center gap-3 border-b border-black/6 last:border-b-0 ${
                                                            currentView === item.key ? 'bg-[#101820] text-white' : 'text-[#101820] hover:bg-[#f5f1e8]'
                                                        }`}
                                                    >
                                                        <ItemIcon className="w-4 h-4" /> {item.label}
                                                    </button>
                                                );
                                            })}
                                            {!user ? (
                                                <button onClick={() => { setShowAuthModal(true); setIsMenuOpen(false); }} className="w-full text-left px-4 py-3 font-bold text-[#101820] flex items-center gap-3 border-t border-black/6 hover:bg-[#f5f1e8]">
                                                    <LogIn className="w-4 h-4" /> 登录
                                                </button>
                                            ) : (
                                                <button onClick={logout} className="w-full text-left px-4 py-3 font-bold text-[#101820] flex items-center gap-3 border-t border-black/6 hover:bg-[#f5f1e8]">
                                                    <LogOut className="w-4 h-4" /> 退出
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </nav>

                    {currentView === 'home' ? (
                        <HomeView
                            user={user}
                            availableCourses={availableCourses}
                            teacherCount={teacherCount}
                            selectedCount={selectedCodes.length}
                            onNavigate={goToView}
                            onOpenLogin={() => setShowAuthModal(true)}
                        />
                    ) : currentView === 'explorer' ? (
                        <div className="max-w-6xl mx-auto px-4 md:px-8 mt-8">
                             <ExplorerView 
                                availableCourses={availableCourses} 
                                onAddCourse={addCourse} 
                                switchToOptimizer={() => goToView('optimizer')} 
                                onViewTeacher={(name) => setViewingTeacher(name)}
                             />
                        </div>
                    ) : currentView === 'teachers' ? (
                        <TeacherListView onViewTeacher={(name) => setViewingTeacher(name)} />
                    ) : currentView === 'classrooms' ? (
                        <FreeClassroomView />
                    ) : currentView === 'ddl' ? (
                        <DDLView user={user} onLoginRequest={() => setShowAuthModal(true)} />
                    ) : currentView === 'settings' ? (
                        <SettingsView user={user} onLogout={() => { setUser(null); goToView('home'); }} />
                    ) : (
                        <React.Fragment>
                        <header className="mb-10 text-center mt-8">
                            <h1 className="text-5xl md:text-7xl font-black text-black tracking-tighter uppercase mb-4 drop-shadow-[4px_4px_0px_rgba(0,0,0,1)]">
                                SCHEDULER<span className="text-[#ec4899]">MAX</span>
                            </h1>
                            <p className="text-xl font-bold text-gray-800 bg-[#a3e635] inline-block px-4 py-1 border-2 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] rotate-[-2deg]">
                                智能排课 · 自动优化
                            </p>
                        </header>

                        <div className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 px-4">
                            <div className="lg:col-span-5 space-y-8">
                                <div className="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 relative overflow-visible z-20">
                                    <div className="absolute top-0 right-0 bg-black text-white px-3 py-1 font-bold text-sm">STEP 01</div>
                                    <h2 className="text-2xl font-black mb-6 flex items-center gap-2"><BookOpen className="w-6 h-6" /> 选择课程</h2>
                                    <div className="relative">
                                        <label className="block font-bold mb-1 text-xs uppercase flex items-center gap-1"><Tag className="w-3 h-3"/> Search Course Code/Name</label>
                                        <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full bg-gray-100 border-2 border-black p-2 font-bold focus:outline-none focus:bg-[#3b82f6] focus:text-white transition-colors uppercase" placeholder="e.g. ACCT4043" disabled={loadingCourses} />
                                        {loadingCourses && <div className="text-xs text-gray-500 mt-1">正在读取Excel数据...</div>}
                                        {searchQuery && filteredCourses.length > 0 && (
                                            <div className="absolute top-full left-0 w-full bg-white border-2 border-black border-t-0 shadow-lg max-h-60 overflow-y-auto z-50">
                                                {filteredCourses.map(c => (
                                                    <div key={c.code} onClick={() => addCourse(c)} className="p-2 hover:bg-gray-100 cursor-pointer border-b border-gray-100 last:border-0">
                                                        <div className="font-bold text-sm">{c.code}</div>
                                                        <div className="text-xs text-gray-600 truncate">{c.name}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                </div>

                                <div className="bg-[#e5e7eb] border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6">
                                    <div className="flex justify-between items-center mb-4">
                                        <h2 className="text-xl font-black flex items-center gap-2"><Clock className="w-6 h-6" /> 待排课程 ({selectedCodes.length})</h2>
                                        {selectedCodes.length > 0 && <button onClick={() => setSelectedCodes([])} className="text-xs font-bold underline hover:text-red-600">清空</button>}
                                    </div>
                                    <div className="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                                        {selectedCodes.length === 0 ? (
                                            <div className="text-center py-10 text-gray-500 font-bold italic border-2 border-dashed border-gray-400">请从上方添加课程...</div>
                                        ) : (
                                            selectedCodes.map(course => (
                                                <div key={course.code} className={`relative group border-2 border-black p-3 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] transition-transform hover:-translate-y-1 bg-white`}>
                                                    <div className={`absolute top-0 left-0 w-2 h-full ${course.color} border-r-2 border-black`}></div>
                                                    <div className="pl-4 flex-1">
                                                        <div className="flex justify-between items-start w-full">
                                                            <span className="font-bold text-xs bg-black text-white px-1 mb-1 inline-block">{course.code}</span>
                                                            <div className="flex gap-2">
                                                                <button className="text-black opacity-40 hover:opacity-100 hover:text-blue-600 transition-opacity" onClick={(e) => { e.stopPropagation(); setViewingCourse(course); }} title="View Details"><Info className="w-4 h-4" /></button>
                                                                <button className="text-black opacity-20 group-hover:opacity-100 group-hover:text-red-600 transition-opacity" onClick={(e) => { e.stopPropagation(); removeCourse(course.code); }}><Trash2 className="w-4 h-4" /></button>
                                                            </div>
                                                        </div>
                                                        <h3 className="font-black text-lg leading-tight truncate pr-4">{course.name}</h3>
                                                        <div className="mt-2">
                                                            <select className="w-full text-xs border border-gray-300 rounded p-1 bg-gray-50 focus:outline-none focus:border-black" value={course.preferredTeacher} onChange={(e) => updatePreferredTeacher(course.code, e.target.value)}>
                                                                <option value="">Any Teacher</option>
                                                                {course.teachers && course.teachers.map((t, idx) => <option key={idx} value={t}>{t}</option>)}
                                                            </select>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))
                                        )}
                                    </div>
                                </div>

                                <div className="bg-white border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] p-6 relative">
                                    <div className="absolute top-0 right-0 bg-black text-white px-3 py-1 font-bold text-sm">STEP 02</div>
                                    <h2 className="text-xl font-black mb-6 flex items-center gap-2"><Clock className="w-6 h-6" /> 时间限制</h2>
                                    <div className="p-4 mb-6 rounded-lg border-2 border-black/10 inline-block text-left w-full bg-gray-50">
                                        <div className="text-black font-bold mb-2 text-sm uppercase">Global Time Range</div>
                                        <div className="flex gap-4 items-center mb-4">
                                            <div><label className="block text-xs font-bold text-black mb-1">Earliest</label><input type="time" value={startTime} onChange={(e) => setStartTime(e.target.value)} className="bg-white border-2 border-black px-2 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] w-full"/></div>
                                            <div className="font-black">-</div>
                                            <div><label className="block text-xs font-bold text-black mb-1">Latest</label><input type="time" value={endTime} onChange={(e) => setEndTime(e.target.value)} className="bg-white border-2 border-black px-2 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] w-full"/></div>
                                        </div>
                                        <div className="border-t border-black/10 my-4"></div>
                                        <div className="text-black font-bold mb-2 text-sm uppercase">Blocked Slots</div>
                                        <div className="flex gap-2 items-end mb-3">
                                            <div className="flex-1">
                                                <select value={newBlockDay} onChange={(e) => setNewBlockDay(e.target.value)} className="bg-white border-2 border-black px-2 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] h-[34px] w-full">
                                                    {['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map(d => <option key={d} value={d}>{d}</option>)}
                                                </select>
                                            </div>
                                            <div className="w-24"><input type="time" value={newBlockStart} onChange={(e) => setNewBlockStart(e.target.value)} className="bg-white border-2 border-black px-1 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] h-[34px] w-full text-sm"/></div>
                                            <div className="w-24"><input type="time" value={newBlockEnd} onChange={(e) => setNewBlockEnd(e.target.value)} className="bg-white border-2 border-black px-1 py-1 font-bold rounded shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] h-[34px] w-full text-sm"/></div>
                                            <button onClick={addBlockedSlot} className="bg-black text-white px-3 h-[34px] font-bold border-2 border-white shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-[2px] active:shadow-none shrink-0"><Plus className="w-4 h-4" /></button>
                                        </div>
                                        <div className="flex flex-wrap gap-2">
                                            {blockedSlots.map(b => (
                                                <div key={b.id} className="bg-red-100 border border-red-500 text-red-700 px-2 py-1 text-xs font-bold flex items-center gap-1 rounded">
                                                    <span>{b.day} {b.start}-{b.end}</span>
                                                    <button onClick={() => removeBlockedSlot(b.id)} className="hover:text-red-900"><X className="w-3 h-3" /></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div className="lg:col-span-7 flex flex-col gap-8">
                                <div className="bg-[#3b82f6] border-4 border-black p-8 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] text-center">
                                    <h2 className="text-3xl font-black text-white mb-2 drop-shadow-[2px_2px_0px_rgba(0,0,0,1)]">开始计算</h2>
                                    <p className="font-bold text-black mb-6">系统将自动尝试所有Session组合以避免时间冲突</p>
                                    <button onClick={calculateOptimal} disabled={selectedCodes.length === 0 || isCalculating} className="bg-[#a3e635] text-black font-black text-2xl py-6 px-12 border-4 border-black hover:shadow-[8px_8px_0px_0px_rgba(255,255,255,1)] hover:-translate-y-2 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-3 mx-auto w-full md:w-auto">
                                        {isCalculating ? <React.Fragment><RefreshCcw className="animate-spin w-8 h-8" /> 计算中...</React.Fragment> : <React.Fragment><Calculator className="w-8 h-8" /> 计算最优课表</React.Fragment>}
                                    </button>
                                </div>

                                <div className="flex-1 bg-black border-4 border-black shadow-[8px_8px_0px_0px_rgba(100,100,100,1)] p-6 md:p-8 min-h-[400px] relative">
                                    <div className="absolute top-0 right-0 bg-[#ec4899] text-white px-3 py-1 font-bold text-sm z-10 border-l-4 border-b-4 border-black">RESULT</div>
                                    {!optimalSchedule ? (
                                        <div className="h-full flex flex-col items-center justify-center text-[#333]">
                                            <Award className="w-24 h-24 mb-4 text-[#333]" />
                                            <p className="text-2xl font-black text-white opacity-20">等待计算结果...</p>
                                        </div>
                                    ) : (
                                        <div className="animate-fade-in">
                                            <div className="flex flex-col md:flex-row justify-between items-end mb-8 border-b-4 border-white pb-4 gap-4">
                                                <div><h2 className="text-4xl font-black text-white mb-2">最佳方案</h2><p className="text-gray-400 font-bold">成功排入 {optimalSchedule.courses.length} 门课程</p></div>
                                                <div className="bg-[#ec4899] text-white p-4 border-2 border-white shadow-[4px_4px_0px_0px_#fff] rotate-1"><span className="block text-sm font-bold uppercase">Total Units</span><span className="block text-5xl font-black">{optimalSchedule.totalUnits}</span></div>
                                            </div>
                                            <div className="grid gap-4">
                                                {optimalSchedule.flatSchedule.map((slot, idx) => (
                                                    <div key={`${slot.id}-${idx}`} className="bg-white border-4 border-transparent hover:border-[#a3e635] p-4 flex flex-col md:flex-row justify-between items-center transition-all">
                                                        <div className="flex items-center gap-4 w-full md:w-auto">
                                                            <div className={`w-3 h-full self-stretch ${slot.color} border-r-2 border-black mr-2 hidden md:block`}></div>
                                                            <div>
                                                                <div className="flex items-center gap-2 mb-1"><span className="bg-black text-white text-xs font-bold px-1.5 py-0.5">{slot.courseCode}</span>{slot.teacher && <span className="text-xs font-bold text-gray-500">{slot.teacher}</span>}</div>
                                                                <h3 className="font-black text-xl leading-tight">{slot.courseName}</h3>
                                                                <div className="flex gap-3 text-sm font-bold mt-1 text-gray-700">
                                                                    <span className="bg-gray-200 px-2 py-0.5 rounded-sm flex items-center gap-1"><Calendar className="w-3 h-3"/> {slot.day}</span>
                                                                    <span className="bg-gray-200 px-2 py-0.5 rounded-sm flex items-center gap-1"><Clock className="w-3 h-3"/> {slot.start} - {slot.end}</span>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        </React.Fragment>
                    )}

                    {viewingCourse && <CourseDetailsModal course={viewingCourse} onClose={() => setViewingCourse(null)} />}
                    {viewingTeacher && <TeacherProfileModal teacherName={viewingTeacher} onClose={() => setViewingTeacher(null)} />}
                    {showAuthModal && <AuthModal onClose={() => setShowAuthModal(false)} onLoginSuccess={setUser} />}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
