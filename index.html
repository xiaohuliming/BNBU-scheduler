<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAXCOURSE Campus Toolkit</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --paper: #f4efe6;
            --paper-strong: #ece4d7;
            --ink: #101820;
            --line: rgba(16, 24, 32, 0.12);
            --signal: #d6ff62;
            --ember: #ff7a1f;
            --deep: #0d161c;
        }
        html { scroll-behavior: smooth; }
        body {
            margin: 0;
            color: var(--ink);
            font-family: 'Space Grotesk', sans-serif;
            background:
                radial-gradient(circle at top left, rgba(214, 255, 98, 0.35), transparent 28%),
                radial-gradient(circle at top right, rgba(255, 122, 31, 0.14), transparent 24%),
                linear-gradient(180deg, #fbf8f2 0%, var(--paper) 100%);
        }
        .mono-ui { font-family: 'IBM Plex Mono', monospace; }
        .home-grid {
            background-image:
                linear-gradient(to right, rgba(16, 24, 32, 0.08) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(16, 24, 32, 0.08) 1px, transparent 1px);
            background-size: 72px 72px;
        }
        .section-kicker {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.4rem 0.75rem;
            border: 1px solid rgba(16, 24, 32, 0.14);
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            font-family: 'IBM Plex Mono', monospace;
            font-size: 0.72rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        @keyframes riseIn {
            from {
                opacity: 0;
                transform: translateY(26px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .tool-reveal {
            opacity: 0;
            animation: riseIn 0.78s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }
        .reveal-delay-1 { animation-delay: 0.12s; }
        .reveal-delay-2 { animation-delay: 0.22s; }
        .reveal-delay-3 { animation-delay: 0.32s; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #555; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Icon Component ---
        const Icon = ({ name, className }) => {
            const ref = useRef(null);
            useEffect(() => {
                if (!ref.current || !window.lucide) return;
                const iconDef = window.lucide.icons[name];
                if (iconDef) {
                    ref.current.innerHTML = '';
                    if (window.lucide.createElement) {
                        const svg = window.lucide.createElement(iconDef);
                        if (className) svg.setAttribute('class', (svg.getAttribute('class') || '') + ' ' + className);
                        ref.current.appendChild(svg);
                    }
                }
            }, [name, className]);
            return <span ref={ref} className={className} style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
        };

        const Plus = (p) => <Icon name="Plus" {...p} />;
        const Trash2 = (p) => <Icon name="Trash2" {...p} />;
        const Calendar = (p) => <Icon name="Calendar" {...p} />;
        const Clock = (p) => <Icon name="Clock" {...p} />;
        const Award = (p) => <Icon name="Award" {...p} />;
        const Calculator = (p) => <Icon name="Calculator" {...p} />;
        const BookOpen = (p) => <Icon name="BookOpen" {...p} />;
        const AlertCircle = (p) => <Icon name="AlertCircle" {...p} />;
        const RefreshCcw = (p) => <Icon name="RefreshCcw" {...p} />;
        const User = (p) => <Icon name="User" {...p} />;
        const Tag = (p) => <Icon name="Tag" {...p} />;
        const Info = (p) => <Icon name="Info" {...p} />;
        const X = (p) => <Icon name="X" {...p} />;
        const Search = (p) => <Icon name="Search" {...p} />;
        const MapPin = (p) => <Icon name="MapPin" {...p} />;
        const ExternalLink = (p) => <Icon name="ExternalLink" {...p} />;
        const CheckSquare = (p) => <Icon name="CheckSquare" {...p} />;
        const Loader2 = (p) => <Icon name="Loader2" {...p} />;
        const RefreshCw = (p) => <Icon name="RefreshCw" {...p} />;
        const Menu = (p) => <Icon name="Menu" {...p} />;
        const LogOut = (p) => <Icon name="LogOut" {...p} />;
        const LogIn = (p) => <Icon name="LogIn" {...p} />;
        const UserPlus = (p) => <Icon name="UserPlus" {...p} />;
        const ChevronDown = (p) => <Icon name="ChevronDown" {...p} />;
        const Globe = (p) => <Icon name="Globe" {...p} />;
        const Bell = (p) => <Icon name="Bell" {...p} />;
        const Star = (p) => <Icon name="Star" {...p} />;
        const UserCheck = (p) => <Icon name="UserCheck" {...p} />;
        const House = (p) => <Icon name="House" {...p} />;
        const Building2 = (p) => <Icon name="Building2" {...p} />;

        const Settings = (p) => <Icon name="Settings" {...p} />;

        const SCHOOL_DAY_OPTIONS = [
            { value: 'Mon', label: '周一' },
            { value: 'Tue', label: '周二' },
            { value: 'Wed', label: '周三' },
            { value: 'Thu', label: '周四' },
            { value: 'Fri', label: '周五' },
            { value: 'Sat', label: '周六' },
            { value: 'Sun', label: '周日' }
        ];

        const SCHOOL_PERIODS = [
            { slot: 'P1', start: '08:00', end: '08:50' },
            { slot: 'P2', start: '09:00', end: '09:50' },
            { slot: 'P3', start: '10:00', end: '10:50' },
            { slot: 'P4', start: '11:00', end: '11:50' },
            { slot: 'P5', start: '13:00', end: '13:50' },
            { slot: 'P6', start: '14:00', end: '14:50' },
            { slot: 'P7', start: '15:00', end: '15:50' },
            { slot: 'P8', start: '16:00', end: '16:50' },
            { slot: 'P9', start: '17:00', end: '17:50' },
            { slot: 'P10', start: '18:00', end: '18:50' },
            { slot: 'P11', start: '19:00', end: '19:50' },
            { slot: 'P12', start: '20:00', end: '20:50' },
            { slot: 'P13', start: '21:00', end: '21:50' }
        ];

        const timeToMinutes = (value) => {
            const [hours, minutes] = String(value).split(':').map(Number);
            return hours * 60 + minutes;
        };

        // --- Explorer View ---
        const ExplorerView = ({ availableCourses, onAddCourse, switchToOptimizer, onViewTeacher }) => {
            const [searchQuery, setSearchQuery] = useState('');
            const [filters, setFilters] = useState({ unit: '', programme: '', type: '', day: '', hours: '', session: '' });
            const [currentPage, setCurrentPage] = useState(1);
            const ITEMS_PER_PAGE = 50;

            const allOfferings = useMemo(() => {
                if (!availableCourses) return [];
                const offerings = [];
                availableCourses.forEach(course => {
                    if (!course.details) return;
                    course.details.forEach(row => {
                         const titleAndSession = row['Course Title & Session'] || course.name;
                         let session = "";
                         const sessionMatch = titleAndSession.match(/\((\d+)\)$/);
                         if (sessionMatch) session = sessionMatch[1];

                         offerings.push({
                             code: row['Course Code'] || course.code,
                             title: titleAndSession,
                             name: course.name,
                             session: session,
                             units: row['Units'],
                             teacher: row['Teachers'],
                             schedule: row['Class Schedule'],
                             classroom: row['Classroom'],
                             curriculumType: row['Curriculum Type'],
                             electiveType: row['Elective Type'],
                             offeringUnit: row['Offering Unit'],
                             offeringProgramme: row['Offering Programme'],
                             requirements: row['Requirements'],
                             hours: row['Hours']
                         });
                    });
                });
                return offerings;
            }, [availableCourses]);

            const uniqueOptions = useMemo(() => {
                const units = new Set();
                const programmes = new Set();
                const types = new Set();
                const hoursList = new Set();
                const sessions = new Set();
                allOfferings.forEach(o => {
                    if(o.offeringUnit) units.add(o.offeringUnit);
                    if(o.offeringProgramme) programmes.add(o.offeringProgramme);
                    if(o.curriculumType) types.add(o.curriculumType);
                    if(o.hours) hoursList.add(o.hours);
                    if(o.session) sessions.add(o.session);
                });
                return {
                    units: Array.from(units).sort(),
                    programmes: Array.from(programmes).sort(),
                    types: Array.from(types).sort(),
                    hours: Array.from(hoursList).sort((a,b) => parseFloat(a) - parseFloat(b)),
                    sessions: Array.from(sessions).sort()
                };
            }, [allOfferings]);

            const hasActiveSearch = searchQuery.length > 0 || Object.values(filters).some(Boolean);

            const filteredDatabase = useMemo(() => {
                if (!hasActiveSearch) return [];
                let result = allOfferings;
                const lowerQuery = searchQuery.toLowerCase();

                if (searchQuery) {
                    result = result.filter(item => 
                        String(item.code).toLowerCase().includes(lowerQuery) ||
                        String(item.title).toLowerCase().includes(lowerQuery) ||
                        String(item.teacher).toLowerCase().includes(lowerQuery) ||
                        String(item.classroom).toLowerCase().includes(lowerQuery)
                    );
                }
                if (filters.unit) result = result.filter(item => item.offeringUnit === filters.unit);
                if (filters.programme) result = result.filter(item => item.offeringProgramme === filters.programme);
                if (filters.type) result = result.filter(item => item.curriculumType === filters.type);
                if (filters.hours) result = result.filter(item => String(item.hours) === filters.hours);
                if (filters.day) result = result.filter(item => item.schedule && item.schedule.includes(filters.day));
                if (filters.session) result = result.filter(item => item.session === filters.session);
                return result; 
            }, [searchQuery, filters, allOfferings, hasActiveSearch]);

            useEffect(() => setCurrentPage(1), [searchQuery, filters]);

            const paginatedResults = useMemo(() => {
                const start = (currentPage - 1) * ITEMS_PER_PAGE;
                return filteredDatabase.slice(start, start + ITEMS_PER_PAGE);
            }, [filteredDatabase, currentPage]);

            const totalPages = Math.ceil(filteredDatabase.length / ITEMS_PER_PAGE);

            const clearFilters = () => {
                setFilters({ unit: '', programme: '', type: '', day: '', hours: '', session: '' });
                setSearchQuery('');
            };

            return (
                <div className={`transition-all duration-500 ${hasActiveSearch ? 'space-y-8' : 'min-h-[60vh] flex flex-col justify-center'}`}>
                    <div className={`bg-white border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] transition-all ${hasActiveSearch ? '' : 'max-w-3xl mx-auto w-full scale-110'}`}>
                        <h2 className="text-4xl font-black mb-4 uppercase drop-shadow-[2px_2px_0px_rgba(0,0,0,1)] text-center">
                            FIND YOUR <span className="text-[#ec4899]">TARGET</span>
                        </h2>
                        <div className="relative mb-4">
                            <input 
                                type="text" 
                                placeholder="搜索 Code / 课程名 / 老师 / 教室 ..." 
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full bg-gray-100 border-2 border-black p-4 pl-14 font-bold text-xl focus:outline-none focus:bg-[#3b82f6] focus:text-white focus:placeholder-white transition-colors"
                            />
                            <Search className="absolute left-4 top-1/2 transform -translate-y-1/2 w-6 h-6 text-gray-500 pointer-events-none" strokeWidth={3} />
                        </div>
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-2 text-xs font-bold">
                             <select value={filters.unit} onChange={e => setFilters({...filters, unit: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Offering Unit</option>
                                {uniqueOptions.units.map(u => <option key={u} value={u}>{u}</option>)}
                             </select>
                             <select value={filters.programme} onChange={e => setFilters({...filters, programme: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Programme</option>
                                {uniqueOptions.programmes.map(p => <option key={p} value={p}>{p}</option>)}
                             </select>
                             <select value={filters.type} onChange={e => setFilters({...filters, type: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Type</option>
                                {uniqueOptions.types.map(t => <option key={t} value={t}>{t}</option>)}
                             </select>
                             <select value={filters.day} onChange={e => setFilters({...filters, day: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Day</option>
                                {['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'].map(d => <option key={d} value={d}>{d}</option>)}
                             </select>
                             <select value={filters.hours} onChange={e => setFilters({...filters, hours: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Hours</option>
                                {uniqueOptions.hours.map(h => <option key={h} value={h}>{h}</option>)}
                             </select>
                             <select value={filters.session} onChange={e => setFilters({...filters, session: e.target.value})} className="border-2 border-black p-2 bg-white focus:bg-[#a3e635] focus:outline-none">
                                <option value="">Session</option>
                                {uniqueOptions.sessions.map(s => <option key={s} value={s}>{s}</option>)}
                             </select>
                        </div>
                        {hasActiveSearch && (
                            <div className="mt-4 flex justify-between items-center">
                                <span className="text-xs font-bold text-gray-500">Found {filteredDatabase.length} results</span>
                                <button onClick={clearFilters} className="text-xs font-bold underline hover:text-red-600 flex items-center gap-1"><X className="w-3 h-3"/> Clear Filters</button>
                            </div>
                        )}
                    </div>

                    {hasActiveSearch && (
                    <React.Fragment>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-fade-in">
                        {paginatedResults.length === 0 ? (
                           <div className="col-span-full text-center py-20 opacity-40">
                              <Search className="w-20 h-20 mx-auto mb-4" />
                              <p className="text-2xl font-black">NO RESULTS FOUND</p>
                           </div>
                        ) : (
                          paginatedResults.map((course, idx) => (
                            <div key={idx} className="bg-white border-4 border-black p-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 transition-all flex flex-col h-full group">
                              <div className="flex justify-between items-start mb-2">
                                <span className="bg-black text-white px-2 py-1 font-black text-lg">{course.code}</span>
                                <span className="bg-[#a3e635] border-2 border-black px-2 py-0.5 font-bold text-xs">{course.units} Units</span>
                              </div>
                              <h3 className="font-black text-xl leading-tight mb-3 min-h-[3rem]">{course.title}</h3>
                              <div className="space-y-2 text-sm font-bold text-gray-700 flex-grow">
                                <div className="flex items-center gap-2">
                                   <User className="w-4 h-4 shrink-0" /> 
                                   <button 
                                       onClick={() => onViewTeacher(course.teacher)}
                                       className="truncate hover:text-[#3b82f6] hover:underline text-left"
                                       title="View Teacher Profile"
                                   >
                                       {course.teacher} <ExternalLink className="w-3 h-3 inline ml-1" />
                                   </button>
                                </div>
                                <div className="flex items-center gap-2">
                                   <Clock className="w-4 h-4 shrink-0" /> 
                                   <span className="bg-gray-100 px-1 border border-gray-300">{course.schedule || 'TBA'}</span>
                                </div>
                                 <div className="flex items-center gap-2">
                                   <MapPin className="w-4 h-4 shrink-0" /> 
                                   <span>{course.classroom || 'TBA'}</span>
                                </div>
                              </div>
                              <button onClick={() => { onAddCourse({ code: course.code, name: course.name }, course.teacher); switchToOptimizer(); }}
                                className="mt-4 w-full bg-black text-white font-black py-3 border-2 border-black hover:bg-[#ec4899] hover:border-black active:translate-y-1 transition-colors flex items-center justify-center gap-2">
                                <Plus className="w-5 h-5" /> 添加到排课
                              </button>
                            </div>
                          ))
                        )}
                    </div>
                    {totalPages > 1 && (
                        <div className="flex justify-center items-center gap-4 py-8">
                            <button onClick={() => setCurrentPage(p => Math.max(1, p - 1))} disabled={currentPage === 1} className="px-4 py-2 font-bold border-2 border-black bg-white hover:bg-gray-100 disabled:opacity-50">Prev</button>
                            <span className="font-bold">Page {currentPage} of {totalPages}</span>
                            <button onClick={() => setCurrentPage(p => Math.min(totalPages, p + 1))} disabled={currentPage === totalPages} className="px-4 py-2 font-bold border-2 border-black bg-white hover:bg-gray-100 disabled:opacity-50">Next</button>
                        </div>
                    )}
                    </React.Fragment>
                    )}
                </div>
            );
        };

        const CourseDetailsModal = ({ course, onClose }) => {
            if (!course) return null;
            const columns = ["Course Title & Session", "Offering Unit", "Offering Programme", "Units", "Curriculum Type", "Elective Type", "Teachers", "Class Schedule", "Hours", "Classroom", "Requirements"];
            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/50" onClick={onClose}></div>
                    <div className="relative bg-white w-full max-w-6xl max-h-[90vh] overflow-hidden flex flex-col border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
                        <div className="bg-black text-white p-4 flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-bold">{course.code} - {course.name}</h2>
                            <button onClick={onClose} className="hover:text-red-400 bg-white text-black p-1 rounded transition-transform hover:scale-110"><X className="w-6 h-6" /></button>
                        </div>
                        <div className="overflow-auto p-4 custom-scrollbar bg-white grow">
                            {(!course.details || course.details.length === 0) ? (
                                <div className="text-center py-10 text-red-500 font-bold">No details available.</div>
                            ) : (
                                <table className="w-full text-sm border-collapse border border-black">
                                    <thead className="bg-gray-100 sticky top-0 z-10">
                                        <tr>{columns.map(col => <th key={col} className="border border-black p-2 text-left whitespace-nowrap bg-gray-100 font-bold shadow-sm">{col}</th>)}</tr>
                                    </thead>
                                    <tbody>
                                        {course.details.map((row, idx) => (
                                            <tr key={idx} className="hover:bg-blue-50 transition-colors">
                                                {columns.map(col => <td key={col} className="border border-black p-2 whitespace-nowrap max-w-[300px] overflow-hidden text-ellipsis" title={row[col]}>{row[col]}</td>)}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const TodoDetailsModal = ({ todo, onClose, onUpdate }) => {
            const [description, setDescription] = useState(todo.description || '');
            const [saving, setSaving] = useState(false);

            const handleSave = async () => {
                setSaving(true);
                try {
                    const res = await fetch(`/api/todos/${todo.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ description })
                    });
                    if (res.ok) {
                        onUpdate();
                        onClose();
                    }
                } catch (e) { console.error(e); }
                setSaving(false);
            };

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/50" onClick={onClose}></div>
                    <div className="relative bg-white w-full max-w-2xl flex flex-col border-4 border-black shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
                        <div className="bg-black text-white p-4 flex justify-between items-center shrink-0">
                            <h2 className="text-xl font-bold truncate pr-4">{todo.title}</h2>
                            <button onClick={onClose} className="hover:text-red-400 bg-white text-black p-1 rounded transition-transform hover:scale-110"><X className="w-6 h-6" /></button>
                        </div>
                        <div className="p-6 bg-white grow">
                            <div className="mb-4">
                                <span className="text-xs font-bold text-gray-500 uppercase block mb-1">Course</span>
                                <span className="font-bold text-lg">{todo.course || 'Personal Task'}</span>
                            </div>
                            <div className="mb-4">
                                <span className="text-xs font-bold text-gray-500 uppercase block mb-1">Due Date</span>
                                <span className="font-bold text-lg">{new Date(todo.due_date * 1000).toLocaleString()}</span>
                            </div>
                            <div className="mb-6">
                                <span className="text-xs font-bold text-gray-500 uppercase block mb-1">Notes</span>
                                <textarea 
                                    className="w-full h-40 border-2 border-black p-3 font-bold focus:outline-none focus:bg-blue-50 resize-none"
                                    placeholder="Add notes or description here..."
                                    value={description}
                                    onChange={e => setDescription(e.target.value)}
                                />
                            </div>
                            <div className="flex justify-end gap-4">
                                <button onClick={onClose} className="px-6 py-2 font-bold border-2 border-black hover:bg-gray-100">Cancel</button>
                                <button onClick={handleSave} disabled={saving} className="px-6 py-2 font-bold bg-black text-white border-2 border-black hover:bg-[#a3e635] hover:text-black transition-colors flex items-center gap-2">
                                    {saving ? <Loader2 className="animate-spin w-4 h-4"/> : <React.Fragment><CheckSquare className="w-4 h-4"/> Save Notes</React.Fragment>}
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const TeacherProfileModal = ({ teacherName, onClose }) => {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [submitting, setSubmitting] = useState(false);
            const [userRating, setUserRating] = useState(null);
            const [comment, setComment] = useState("");
            const [isAnonymous, setIsAnonymous] = useState(false);
            const [selectedCourse, setSelectedCourse] = useState("");
            const [showAllReviews, setShowAllReviews] = useState(false);

            useEffect(() => {
                fetch(`/api/teachers/${encodeURIComponent(teacherName)}`)
                    .then(res => res.json())
                    .then(d => {
                        setData(d);
                        setUserRating(d.user_rating);
                        if(d.user_comment) setComment(d.user_comment);
                        if(d.user_is_anonymous) setIsAnonymous(d.user_is_anonymous);
                        if(d.user_course) setSelectedCourse(d.user_course);
                        setLoading(false);
                    })
                    .catch(e => { console.error(e); setLoading(false); });
            }, [teacherName]);

            const handleSubmit = async () => {
                if(!userRating) {
                    alert("Please select a rating first.");
                    return;
                }
                
                setSubmitting(true);
                try {
                    const res = await fetch(`/api/teachers/${encodeURIComponent(teacherName)}/rate`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            rating: userRating,
                            comment: comment,
                            is_anonymous: isAnonymous,
                            course: selectedCourse
                        })
                    });
                    if (res.ok) {
                        // Refresh data
                        const newData = await fetch(`/api/teachers/${encodeURIComponent(teacherName)}`).then(r => r.json());
                        setData(newData);
                        alert("Rating & Comment Saved!");
                    } else {
                        const err = await res.json();
                        if (err.error === "Unauthorized") alert("Please login to rate teachers.");
                        else alert(err.error);
                    }
                } catch(e) { console.error(e); }
                setSubmitting(false);
            };

            const ratingLabels = [
                { val: 5, label: "🔥 夯", color: "bg-[#a3e635]" },
                { val: 4, label: "🌟 顶级", color: "bg-purple-200" },
                { val: 3, label: "🧐 人上人", color: "bg-blue-200" },
                { val: 2, label: "😐 NPC", color: "bg-yellow-200" },
                { val: 1, label: "💩 拉完了", color: "bg-gray-300" }
            ];

            const officialUrl = `https://www.bnbu.edu.cn/faculty.htm#/list/people/cn.html?name=${encodeURIComponent(teacherName)}`;

            return (
                <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4">
                    <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}></div>
                    <div className="relative bg-white w-full max-w-5xl max-h-[90vh] flex flex-col border-4 border-black shadow-[12px_12px_0px_0px_rgba(0,0,0,1)] animate-fade-in overflow-hidden">
                        
                        {/* Header */}
                        <div className="bg-[#ec4899] text-white p-6 border-b-4 border-black flex justify-between items-start shrink-0">
                            <div>
                                <h2 className="text-4xl font-black uppercase tracking-tighter mb-2">{teacherName}</h2>
                                <div className="flex flex-wrap items-center gap-4">
                                    <div className="bg-black text-[#a3e635] px-3 py-1 font-black text-xl border-2 border-white shadow-[4px_4px_0px_0px_rgba(255,255,255,1)]">
                                        RATING: {data ? (data.average_rating ? data.average_rating.toFixed(1) : "N/A") : "..."}
                                    </div>
                                    <span className="font-bold text-sm bg-white text-black px-2 py-1">{data ? data.rating_count : 0} VOTES</span>
                                    <a href={officialUrl} target="_blank" rel="noopener noreferrer" className="bg-white text-blue-600 px-3 py-1 font-black border-2 border-black hover:bg-blue-500 hover:text-white transition-colors flex items-center gap-1 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none">
                                        <Globe className="w-4 h-4" /> Official Profile
                                    </a>
                                </div>
                            </div>
                            <button onClick={onClose} className="bg-white text-black p-2 border-2 border-black hover:bg-black hover:text-white transition-colors shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none">
                                <X className="w-6 h-6" />
                            </button>
                        </div>

                        <div className="overflow-y-auto p-6 bg-[#fff1f2] grow custom-scrollbar">
                            {loading ? (
                                <div className="flex justify-center py-20"><Loader2 className="w-12 h-12 animate-spin" /></div>
                            ) : (
                                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                    {/* Left: Rating Panel */}
                                    <div className="lg:col-span-1 space-y-6">
                                        <div className="bg-white border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)]">
                                            <h3 className="text-xl font-black mb-4 flex items-center gap-2 uppercase"><Star className="w-6 h-6 fill-current" /> Rate & Comment</h3>
                                            
                                            {/* Rating Buttons */}
                                            <div className="space-y-2 mb-4">
                                                {ratingLabels.map((r) => (
                                                    <button 
                                                        key={r.val}
                                                        onClick={() => setUserRating(r.val)}
                                                        className={`w-full text-left px-4 py-3 font-bold border-2 border-black flex justify-between items-center transition-all 
                                                            ${userRating === r.val ? `${r.color} translate-x-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]` : 'bg-white hover:bg-gray-50 hover:translate-x-1'}
                                                        `}
                                                    >
                                                        <span>{r.label}</span>
                                                        {userRating === r.val && <CheckSquare className="w-5 h-5" />}
                                                    </button>
                                                ))}
                                            </div>

                                            {/* Comment Section */}
                                            <div className="border-t-2 border-black pt-4 space-y-3">
                                                <div>
                                                    <label className="block text-xs font-black uppercase mb-1">Related Course (Optional)</label>
                                                    <select 
                                                        value={selectedCourse} 
                                                        onChange={e => setSelectedCourse(e.target.value)}
                                                        className="w-full border-2 border-black p-2 font-bold text-sm bg-white focus:bg-blue-50 focus:outline-none"
                                                    >
                                                        <option value="">-- Select Course --</option>
                                                        {data.courses.map((c, idx) => (
                                                            <option key={idx} value={c.code}>{c.code} - {c.title}</option>
                                                        ))}
                                                    </select>
                                                </div>
                                                
                                                <div>
                                                    <label className="block text-xs font-black uppercase mb-1">Your Comment (Optional)</label>
                                                    <textarea 
                                                        className="w-full border-2 border-black p-2 font-bold text-sm focus:bg-blue-50 focus:outline-none min-h-[80px] resize-none"
                                                        placeholder="Share your thoughts..."
                                                        value={comment}
                                                        onChange={e => setComment(e.target.value)}
                                                    />
                                                </div>

                                                <div className="flex flex-col gap-3">
                                                    <label className="flex items-center gap-2 font-bold text-sm cursor-pointer select-none">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={isAnonymous} 
                                                            onChange={e => setIsAnonymous(e.target.checked)}
                                                            className="w-4 h-4 border-2 border-black rounded-none accent-black"
                                                        />
                                                        Anonymous
                                                    </label>
                                                    <button 
                                                        onClick={handleSubmit}
                                                        disabled={submitting || !userRating}
                                                        className="w-full bg-black text-white px-4 py-3 font-black text-lg border-2 border-black hover:bg-[#a3e635] hover:text-black hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
                                                    >
                                                        {submitting ? <Loader2 className="animate-spin" /> : "SUBMIT REVIEW"}
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Right: Courses & Comments */}
                                    <div className="lg:col-span-2 space-y-8">
                                        {/* Courses */}
                                        <div>
                                            <h3 className="text-2xl font-black mb-4 uppercase flex items-center gap-2 bg-black text-white px-4 py-2 inline-block -rotate-1">
                                                <BookOpen className="w-6 h-6" /> Teaching This Semester
                                            </h3>
                                            
                                            {data.courses.length === 0 ? (
                                                <div className="bg-white border-4 border-black p-6 font-bold text-gray-500 text-center">No courses found for this semester.</div>
                                            ) : (
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {data.courses.map((c, idx) => (
                                                        <div key={idx} className="bg-white border-4 border-black p-4 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 transition-transform cursor-pointer" onClick={() => setSelectedCourse(c.code)}>
                                                            <div className="flex justify-between items-start mb-2">
                                                                <span className="bg-black text-white px-2 py-0.5 text-sm font-bold">{c.code}</span>
                                                                <span className="font-black text-sm">{c.units} Units</span>
                                                            </div>
                                                            <h4 className="font-black text-lg leading-tight mb-3">{c.title}</h4>
                                                            <div className="grid grid-cols-1 gap-1 text-sm font-bold text-gray-700">
                                                                <div className="flex items-center gap-2"><Clock className="w-4 h-4" /> {c.schedule}</div>
                                                                <div className="flex items-center gap-2"><MapPin className="w-4 h-4" /> {c.classroom}</div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {/* Comments List */}
                                        <div>
                                            <div className="flex justify-between items-end mb-4">
                                                <h3 className="text-2xl font-black uppercase flex items-center gap-2 bg-white border-4 border-black px-4 py-2 inline-block rotate-1 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                                    <UserCheck className="w-6 h-6" /> Student Reviews
                                                </h3>
                                                {data.comments && data.comments.length > 3 && (
                                                    <button 
                                                        onClick={() => setShowAllReviews(!showAllReviews)}
                                                        className="text-sm font-black underline hover:text-blue-600"
                                                    >
                                                        {showAllReviews ? "Show Less" : `View All (${data.comments.length})`}
                                                    </button>
                                                )}
                                            </div>
                                            
                                            <div className="space-y-4">
                                                {(!data.comments || data.comments.length === 0) ? (
                                                     <div className="text-center font-bold text-gray-500 py-4 italic">No reviews yet. Be the first!</div>
                                                ) : (
                                                    (showAllReviews ? data.comments : data.comments.slice(0, 3)).map((c, idx) => (
                                                        <div key={idx} className="bg-white border-2 border-black p-4 shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                                                            <div className="flex justify-between items-start mb-2">
                                                                <div className="flex flex-col gap-1">
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="font-black text-sm uppercase bg-yellow-200 border border-black px-2">{c.user}</span>
                                                                        <span className="text-xs font-bold text-gray-500">{new Date(c.date).toLocaleDateString()}</span>
                                                                    </div>
                                                                    {c.course && (
                                                                        <span className="text-xs font-bold text-gray-600 bg-gray-100 px-1 inline-block w-fit">Course: {c.course}</span>
                                                                    )}
                                                                </div>
                                                                <div className="flex items-center gap-1 bg-black text-white px-2 text-xs font-bold">
                                                                    <Star className="w-3 h-3 fill-white" /> {c.rating}
                                                                </div>
                                                            </div>
                                                            <p className="font-bold text-gray-800 text-sm whitespace-pre-wrap">{c.comment}</p>
                                                        </div>
                                                    ))
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // --- DDL View Component (Modified) ---
        const DDLView = ({ user, onLoginRequest }) => {
            const [todos, setTodos] = useState([]);
            const [loading, setLoading] = useState(false);
            const [syncing, setSyncing] = useState(false);
            const [error, setError] = useState(null);
            const [selectedTodo, setSelectedTodo] = useState(null);
            const [showNotifOptions, setShowNotifOptions] = useState(false);
            
            // Filters & Views
            const [viewMode, setViewMode] = useState('active'); // 'active' | 'completed'
            const [filterCourse, setFilterCourse] = useState('');
            const [filterTime, setFilterTime] = useState(''); // 'overdue' | 'today' | '3days' | '7days'
            
            // Manual Add Form
            const [showAddForm, setShowAddForm] = useState(false);
            const [newTodo, setNewTodo] = useState({ title: '', course: '', due_date: '', due_time: '', description: '' });

            useEffect(() => {
                if (user) fetchTodos();
            }, [user]);

            const fetchTodos = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/api/todos');
                    if (res.ok) {
                        const data = await res.json();
                        setTodos(data);
                    }
                } catch (e) { console.error(e); }
                setLoading(false);
            };

            const handleSync = async () => {
                if (!user.ispace_username) {
                    alert("Please login with iSpace account first or link your account.");
                    return;
                }
                const password = prompt("Please confirm your iSpace password to sync:");
                if (!password) return;

                setSyncing(true);
                try {
                    const res = await fetch('/api/todos/sync', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: user.ispace_username, password })
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert(`Synced ${data.added} new tasks.`);
                        fetchTodos();
                    } else {
                        alert(data.error || "Sync failed");
                    }
                } catch (e) { alert("Sync error"); }
                setSyncing(false);
            };
            
            const handleAddTodo = async (e) => {
                e.preventDefault();
                if (!newTodo.title || !newTodo.due_date) return;
                
                // Combine date and time
                const dateStr = newTodo.due_time ? `${newTodo.due_date}T${newTodo.due_time}` : `${newTodo.due_date}T23:59`;
                
                try {
                    const res = await fetch('/api/todos/add', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            title: newTodo.title,
                            course: newTodo.course,
                            description: newTodo.description,
                            due_date: dateStr
                        })
                    });
                    if (res.ok) {
                        setShowAddForm(false);
                        setNewTodo({ title: '', course: '', due_date: '', due_time: '', description: '' });
                        fetchTodos();
                    } else {
                        alert("Failed to add task");
                    }
                } catch(e) { console.error(e); }
            };
            
            const toggleComplete = async (todo) => {
                const endpoint = todo.is_completed ? 'incomplete' : 'complete';
                try {
                    const res = await fetch(`/api/todos/${todo.id}/${endpoint}`, { method: 'POST' });
                    if (res.ok) fetchTodos();
                } catch(e) { console.error(e); }
            };
            
            const deleteTodo = async (id) => {
                if(!confirm("Are you sure you want to delete this task?")) return;
                try {
                    const res = await fetch(`/api/todos/${id}`, { method: 'DELETE' });
                    if (res.ok) fetchTodos();
                } catch(e) { console.error(e); }
            };

            const filteredTodos = useMemo(() => {
                let result = todos;
                
                // Filter by view mode
                if (viewMode === 'active') {
                    result = result.filter(t => !t.is_completed);
                } else {
                    result = result.filter(t => t.is_completed);
                }
                
                // Filter by course
                if (filterCourse) {
                    result = result.filter(t => t.course && t.course.toLowerCase().includes(filterCourse.toLowerCase()));
                }

                // Filter by time
                if (filterTime) {
                    const now = new Date();
                    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime() / 1000;
                    
                    if (filterTime === 'overdue') {
                         result = result.filter(t => t.due_date < (now.getTime() / 1000));
                    } else if (filterTime === 'today') {
                         result = result.filter(t => {
                             const d = new Date(t.due_date * 1000);
                             return d.getDate() === now.getDate() && d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
                         });
                    } else if (filterTime === '3days') {
                         const limit = today + (3 * 24 * 60 * 60);
                         result = result.filter(t => t.due_date >= today && t.due_date <= limit);
                    } else if (filterTime === '7days') {
                         const limit = today + (7 * 24 * 60 * 60);
                         result = result.filter(t => t.due_date >= today && t.due_date <= limit);
                    }
                }
                
                return result;
            }, [todos, viewMode, filterCourse, filterTime]);
            
            const uniqueCourses = useMemo(() => {
                const courses = new Set(todos.map(t => t.course).filter(Boolean));
                return Array.from(courses).sort();
            }, [todos]);

            if (!user) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-[50vh] text-center">
                        <CheckSquare className="w-24 h-24 text-gray-300 mb-6" />
                        <h2 className="text-3xl font-black mb-4">LOGIN REQUIRED</h2>
                        <p className="mb-8 font-bold text-gray-500">Please login to access your To-Do List and sync with iSpace.</p>
                        <button onClick={onLoginRequest} className="bg-black text-white font-black py-3 px-8 border-2 border-black hover:bg-[#ec4899] transition-colors shadow-[4px_4px_0px_0px_rgba(0,0,0,1)]">
                            LOGIN NOW
                        </button>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto px-4 mt-8">
                    <header className="mb-8 border-b-4 border-black pb-4">
                        <div className="flex flex-col md:flex-row justify-between items-end gap-4 mb-4">
                            <h1 className="text-4xl font-black uppercase mb-1 flex items-center gap-3">
                                <CheckSquare className="w-10 h-10" /> My Tasks
                            </h1>
                            <div className="flex gap-4 flex-wrap">
                                <button onClick={() => setShowAddForm(true)} className="flex items-center gap-2 font-bold hover:text-[#a3e635] bg-black text-white border-2 border-black px-4 py-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">
                                    <Plus className="w-5 h-5" /> Add Task
                                </button>
                                <button onClick={handleSync} disabled={syncing} className="flex items-center gap-2 font-bold hover:text-[#3b82f6] bg-white border-2 border-black px-4 py-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">
                                    <RefreshCw className={`w-5 h-5 ${syncing ? 'animate-spin' : ''}`} /> 
                                    {syncing ? 'Syncing...' : 'Sync iSpace'}
                                </button>
                                <div className="relative">
                                    <button onClick={() => setShowNotifOptions(!showNotifOptions)} className="flex items-center gap-2 font-bold hover:text-[#ec4899] bg-white border-2 border-black px-3 py-2 shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-y-1 active:shadow-none transition-all">
                                        <Bell className="w-5 h-5" />
                                    </button>
                                    {showNotifOptions && (
                                        <div className="absolute right-0 top-full mt-2 w-64 bg-white border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] z-50">
                                            <div className="p-3 border-b-2 border-gray-100">
                                                <div className="font-bold text-sm mb-1">WeChat Mini Program</div>
                                                <div className="text-xs text-gray-500 font-bold bg-gray-100 inline-block px-1">Under Development</div>
                                            </div>
                                            <div className="p-3">
                                                <div className="font-bold text-sm mb-1">Email Notification</div>
                                                <div className="text-xs text-gray-500 font-bold bg-gray-100 inline-block px-1">Under Development</div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        
                        {/* Filters & Tabs */}
                        <div className="flex flex-col md:flex-row gap-4 justify-between items-center bg-gray-100 p-4 border-2 border-black">
                            <div className="flex gap-2">
                                <button 
                                    onClick={() => setViewMode('active')}
                                    className={`px-4 py-1 font-bold border-2 border-black transition-all ${viewMode === 'active' ? 'bg-[#3b82f6] text-white shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]' : 'bg-white hover:bg-gray-200'}`}
                                >
                                    Active
                                </button>
                                <button 
                                    onClick={() => setViewMode('completed')}
                                    className={`px-4 py-1 font-bold border-2 border-black transition-all ${viewMode === 'completed' ? 'bg-[#a3e635] text-black shadow-[2px_2px_0px_0px_rgba(0,0,0,1)]' : 'bg-white hover:bg-gray-200'}`}
                                >
                                    Completed
                                </button>
                            </div>
                            
                            <div className="flex items-center gap-2 w-full md:w-auto">
                                <span className="font-bold text-xs uppercase">Time:</span>
                                <select 
                                    value={filterTime} 
                                    onChange={(e) => setFilterTime(e.target.value)}
                                    className="border-2 border-black p-1 font-bold text-sm bg-white focus:outline-none focus:bg-[#ec4899] focus:text-white transition-colors flex-grow md:flex-grow-0"
                                >
                                    <option value="">All Time</option>
                                    <option value="today">Today</option>
                                    <option value="3days">Next 3 Days</option>
                                    <option value="7days">Next 7 Days</option>
                                    <option value="overdue">Overdue</option>
                                </select>
                            </div>

                            <div className="flex items-center gap-2 w-full md:w-auto">
                                <span className="font-bold text-xs uppercase">Course:</span>
                                <select 
                                    value={filterCourse} 
                                    onChange={(e) => setFilterCourse(e.target.value)}
                                    className="border-2 border-black p-1 font-bold text-sm bg-white focus:outline-none focus:bg-[#ec4899] focus:text-white transition-colors flex-grow md:flex-grow-0 max-w-[200px]"
                                >
                                    <option value="">All Courses</option>
                                    {uniqueCourses.map(c => <option key={c} value={c}>{c.length > 25 ? c.substring(0, 25) + '...' : c}</option>)}
                                </select>
                            </div>
                        </div>
                    </header>
                    
                    {/* Add Form */}
                    {showAddForm && (
                        <div className="mb-8 bg-white border-4 border-black p-6 shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] animate-fade-in relative">
                            <button onClick={() => setShowAddForm(false)} className="absolute top-2 right-2 hover:bg-red-100 p-1"><X className="w-5 h-5"/></button>
                            <h3 className="font-black text-xl mb-4 flex items-center gap-2"><Plus className="w-6 h-6"/> NEW TASK</h3>
                            <form onSubmit={handleAddTodo} className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="col-span-full">
                                    <label className="block text-xs font-bold uppercase mb-1">Title</label>
                                    <input type="text" required value={newTodo.title} onChange={e => setNewTodo({...newTodo, title: e.target.value})} className="w-full border-2 border-black p-2 font-bold focus:bg-blue-50 focus:outline-none" placeholder="Task description..."/>
                                </div>
                                <div>
                                    <label className="block text-xs font-bold uppercase mb-1">Course (Optional)</label>
                                    <input type="text" value={newTodo.course} onChange={e => setNewTodo({...newTodo, course: e.target.value})} className="w-full border-2 border-black p-2 font-bold focus:bg-blue-50 focus:outline-none" placeholder="e.g. ACCT4043"/>
                                </div>
                                <div className="grid grid-cols-2 gap-2">
                                    <div>
                                        <label className="block text-xs font-bold uppercase mb-1">Due Date</label>
                                        <input type="date" required value={newTodo.due_date} onChange={e => setNewTodo({...newTodo, due_date: e.target.value})} className="w-full border-2 border-black p-2 font-bold focus:bg-blue-50 focus:outline-none"/>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold uppercase mb-1">Time</label>
                                        <input type="time" value={newTodo.due_time} onChange={e => setNewTodo({...newTodo, due_time: e.target.value})} className="w-full border-2 border-black p-2 font-bold focus:bg-blue-50 focus:outline-none"/>
                                    </div>
                                </div>
                                <div className="col-span-full">
                                    <label className="block text-xs font-bold uppercase mb-1">Notes (Optional)</label>
                                    <textarea 
                                        className="w-full h-20 border-2 border-black p-2 font-bold focus:bg-blue-50 focus:outline-none resize-none"
                                        placeholder="Add notes or description here..."
                                        value={newTodo.description}
                                        onChange={e => setNewTodo({...newTodo, description: e.target.value})}
                                    />
                                </div>
                                <button type="submit" className="col-span-full bg-black text-white font-black py-3 border-2 border-black hover:bg-[#a3e635] hover:text-black transition-colors">ADD TASK</button>
                            </form>
                        </div>
                    )}

                    {filteredTodos.length === 0 ? (
                        <div className="text-center py-20 opacity-50">
                            <CheckSquare className="w-24 h-24 mx-auto mb-4" />
                            <p className="text-3xl font-black">ALL CAUGHT UP!</p>
                            <p className="font-bold">No tasks found in this view.</p>
                        </div>
                    ) : (
                        <div className="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
                            {filteredTodos.map(todo => {
                                const dueDate = new Date(todo.due_date * 1000);
                                const now = new Date();
                                const diffMs = dueDate - now;
                                const diffHrs = Math.ceil(diffMs / (1000 * 60 * 60));
                                const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));
                                
                                let badgeColor = 'bg-blue-100 text-blue-800 border-blue-500';
                                let statusText = '';
                                
                                if (todo.is_completed) {
                                    badgeColor = 'bg-gray-100 text-gray-500 border-gray-400';
                                    statusText = 'Completed';
                                } else if (diffMs < 0) {
                                    badgeColor = 'bg-red-100 text-red-800 border-red-500';
                                    statusText = 'Overdue';
                                } else if (diffHrs < 24) {
                                    badgeColor = 'bg-red-100 text-red-800 border-red-500';
                                    statusText = `Due in ${diffHrs}h`;
                                } else {
                                    const d = Math.floor(diffHrs / 24);
                                    const h = diffHrs % 24;
                                    statusText = `Due in ${d}d ${h}h`;
                                    if (d <= 1) {
                                        badgeColor = 'bg-red-100 text-red-800 border-red-500';
                                    } else if (d <= 7) {
                                        badgeColor = 'bg-orange-100 text-orange-800 border-orange-500';
                                    }
                                }
                                
                                return (
                                    <div key={todo.id} onClick={() => setSelectedTodo(todo)} className={`cursor-pointer bg-white border-4 border-black p-5 shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 transition-transform relative group flex flex-col ${todo.is_completed ? 'opacity-60 grayscale' : ''}`}>
                                        <div className="flex justify-between items-start mb-3">
                                            <span className={`px-2 py-0.5 text-xs font-black uppercase border-2 ${badgeColor}`}>{statusText}</span>
                                            <div className="flex items-center gap-2">
                                                <span className="text-xs font-bold text-gray-500 flex items-center gap-1"><Clock className="w-3 h-3"/> {dueDate.toLocaleDateString()}</span>
                                                <button onClick={(e) => { e.stopPropagation(); deleteTodo(todo.id); }} className="text-gray-400 hover:text-red-600 transition-colors" title="Delete Task"><Trash2 className="w-4 h-4"/></button>
                                            </div>
                                        </div>
                                        
                                        <h3 className="font-bold text-lg leading-tight mb-2 h-[2.85rem] overflow-hidden line-clamp-2">
                                            {todo.title}
                                        </h3>
                                        
                                        <div className="text-sm font-bold text-gray-600 mb-4 flex items-start gap-2 min-h-[2.5rem]">
                                            <BookOpen className="w-4 h-4 mt-0.5 shrink-0" />
                                            <span className="line-clamp-2">{todo.course || 'Personal Task'}</span>
                                        </div>
                                        
                                        <div className="mt-auto flex gap-2">
                                            {todo.url && (
                                                <a href={todo.url} target="_blank" rel="noopener noreferrer" onClick={(e) => e.stopPropagation()} className="flex-1 text-center bg-black text-white font-bold py-2 hover:bg-[#3b82f6] transition-colors flex items-center justify-center gap-2 text-xs" title="Opens iSpace in a new tab. You may need to login.">
                                                    GO TO TASK <ExternalLink className="w-3 h-3" />
                                                </a>
                                            )}
                                            <button 
                                                onClick={(e) => { e.stopPropagation(); toggleComplete(todo); }}
                                                className={`flex-1 text-center font-bold py-2 border-2 border-black transition-colors flex items-center justify-center gap-2 text-xs ${todo.is_completed ? 'bg-gray-200 hover:bg-gray-300' : 'bg-[#a3e635] hover:bg-green-400'}`}
                                            >
                                                {todo.is_completed ? 'UNDO' : 'DONE'} <CheckSquare className="w-3 h-3" />
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}
                    {selectedTodo && <TodoDetailsModal todo={selectedTodo} onClose={() => setSelectedTodo(null)} onUpdate={fetchTodos} />}
                </div>
            );
        };

        const FreeClassroomView = () => {
            const todayValue = SCHOOL_DAY_OPTIONS.find(option => option.value === ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'][new Date().getDay()]);
            const [selectedDay, setSelectedDay] = useState(todayValue ? todayValue.value : 'Mon');
            const [startTime, setStartTime] = useState('08:00');
            const [endTime, setEndTime] = useState('09:50');
            const [buildingFilter, setBuildingFilter] = useState('ALL');
            const [roomKeyword, setRoomKeyword] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [result, setResult] = useState(null);

            const endOptions = useMemo(() => {
                return SCHOOL_PERIODS.filter(period => timeToMinutes(period.end) > timeToMinutes(startTime));
            }, [startTime]);

            useEffect(() => {
                if (timeToMinutes(endTime) <= timeToMinutes(startTime)) {
                    const firstValidEnd = endOptions[0];
                    if (firstValidEnd) setEndTime(firstValidEnd.end);
                }
            }, [startTime, endTime, endOptions]);

            useEffect(() => {
                let ignore = false;
                const params = new URLSearchParams({ day: selectedDay, start: startTime, end: endTime });

                setLoading(true);
                setError(null);

                fetch(`/api/free-classrooms?${params.toString()}`)
                    .then(res => res.json().then(data => ({ ok: res.ok, data })))
                    .then(({ ok, data }) => {
                        if (ignore) return;
                        if (!ok) throw new Error(data.error || 'Failed to load classroom availability');
                        setResult(data);
                        setLoading(false);
                    })
                    .catch(err => {
                        if (ignore) return;
                        setError(err.message);
                        setLoading(false);
                    });

                return () => {
                    ignore = true;
                };
            }, [selectedDay, startTime, endTime]);

            const buildingOptions = useMemo(() => {
                if (!result) return [];
                return result.buildings.filter(item => item.total_rooms > 0);
            }, [result]);

            const filteredRooms = useMemo(() => {
                if (!result) return [];
                const keyword = roomKeyword.trim().toLowerCase();
                return result.rooms.filter(room => {
                    const byBuilding = buildingFilter === 'ALL' || room.building === buildingFilter;
                    const byKeyword = !keyword || room.room.toLowerCase().includes(keyword);
                    return byBuilding && byKeyword;
                });
            }, [result, buildingFilter, roomKeyword]);

            const groupedRooms = useMemo(() => {
                const groups = {};
                filteredRooms.forEach(room => {
                    if (!groups[room.building]) groups[room.building] = [];
                    groups[room.building].push(room);
                });
                return Object.entries(groups).sort((a, b) => a[0].localeCompare(b[0]));
            }, [filteredRooms]);

            return (
                <div className="max-w-7xl mx-auto px-4 md:px-8 xl:px-12 py-8 md:py-10">
                    <div className="grid xl:grid-cols-[360px_minmax(0,1fr)] gap-8 items-start">
                        <aside className="xl:sticky xl:top-28 space-y-6">
                            <div className="bg-white/80 backdrop-blur-sm border border-black/10 rounded-[28px] p-6">
                                <div className="section-kicker">Free Classroom Finder</div>
                                <h1 className="mt-5 text-4xl md:text-5xl font-bold tracking-[-0.06em] leading-[0.95] text-[#101820]">
                                    查询一段时间里整段空着的教室。
                                </h1>
                                <p className="mt-4 text-base leading-relaxed text-black/65">
                                    课表按每节 50 分钟、课间 10 分钟处理，午休默认视为 12:00-13:00。选择周几和时间段后，只返回整段都没有课程冲突的房间。
                                </p>
                            </div>

                            <div className="bg-[#101820] text-white rounded-[28px] p-6">
                                <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-white/45">Query Controls</div>

                                <div className="mt-5">
                                    <div className="text-sm font-bold text-white/72 mb-3">选择周几</div>
                                    <div className="grid grid-cols-4 sm:grid-cols-7 xl:grid-cols-4 gap-2">
                                        {SCHOOL_DAY_OPTIONS.map((day) => (
                                            <button
                                                key={day.value}
                                                onClick={() => setSelectedDay(day.value)}
                                                className={`px-3 py-2 rounded-2xl font-bold text-sm transition-colors ${
                                                    selectedDay === day.value
                                                        ? 'bg-[#d6ff62] text-[#101820]'
                                                        : 'bg-white/8 text-white hover:bg-white/14'
                                                }`}
                                            >
                                                {day.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                <div className="mt-6 grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div>
                                        <label className="mono-ui text-[11px] uppercase tracking-[0.18em] text-white/45">Start</label>
                                        <select value={startTime} onChange={(e) => setStartTime(e.target.value)} className="mt-2 w-full rounded-2xl border border-white/10 bg-white/8 px-4 py-3 font-bold text-white focus:outline-none focus:border-[#d6ff62]">
                                            {SCHOOL_PERIODS.map(period => (
                                                <option key={period.start} value={period.start} className="text-black">
                                                    {period.slot} · {period.start}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="mono-ui text-[11px] uppercase tracking-[0.18em] text-white/45">End</label>
                                        <select value={endTime} onChange={(e) => setEndTime(e.target.value)} className="mt-2 w-full rounded-2xl border border-white/10 bg-white/8 px-4 py-3 font-bold text-white focus:outline-none focus:border-[#d6ff62]">
                                            {endOptions.map(period => (
                                                <option key={period.end} value={period.end} className="text-black">
                                                    {period.slot} · {period.end}
                                                </option>
                                            ))}
                                        </select>
                                    </div>
                                </div>

                                <div className="mt-6 rounded-2xl bg-white/6 border border-white/8 p-4">
                                    <div className="mono-ui text-[11px] uppercase tracking-[0.18em] text-white/45">School Rhythm</div>
                                    <div className="mt-3 grid grid-cols-2 gap-2 text-sm font-bold text-white/72">
                                        {SCHOOL_PERIODS.slice(0, 4).map(period => (
                                            <div key={period.slot}>{period.slot} · {period.start}-{period.end}</div>
                                        ))}
                                        <div className="col-span-2 text-[#d6ff62]">Lunch · 12:00-13:00</div>
                                        {SCHOOL_PERIODS.slice(4).map(period => (
                                            <div key={period.slot}>{period.slot} · {period.start}-{period.end}</div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </aside>

                        <main className="space-y-6">
                            <div className="grid md:grid-cols-[minmax(0,1fr)_auto] gap-4 items-end">
                                <div>
                                    <div className="section-kicker">
                                        {result ? `${result.query.day_label} · ${result.query.start} - ${result.query.end}` : 'Loading'}
                                    </div>
