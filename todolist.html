<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSpace To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 20px;
        }
        .todo-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .todo-card:hover {
            transform: translateY(-5px);
        }
        .course-badge {
            font-size: 0.8em;
            background-color: #0d6efd;
        }
        .due-date {
            color: #dc3545;
            font-weight: bold;
        }
        .header-title {
            color: #343a40;
            margin-bottom: 30px;
            border-bottom: 2px solid #dee2e6;
            padding-bottom: 10px;
        }
        .action-btn {
            border-radius: 20px;
        }
        .empty-state {
            text-align: center;
            padding: 50px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center header-title">
            <h1><i class="fas fa-tasks me-2"></i>iSpace To-Do List</h1>
            <span id="last-updated" class="text-muted small"></span>
        </div>

        <div id="todo-container" class="row">
            <!-- To-do items will be injected here -->
            <div class="col-12 text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Load data from JS file for local access -->
    <script src="todolist.js"></script>

    <script>
        function loadTodos() {
            if (typeof todoData !== 'undefined') {
                renderTodos(todoData);
            } else {
                // Fallback to fetch if todoData is not defined (e.g. if todolist.js is missing but json exists)
                fetchTodos();
            }
        }

        async function fetchTodos() {
            try {
                const response = await fetch('todolist.json?t=' + new Date().getTime());
                if (!response.ok) {
                    throw new Error('Failed to load todo list');
                }
                const todos = await response.json();
                renderTodos(todos);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('todo-container').innerHTML = `
                    <div class="col-12 empty-state">
                        <i class="fas fa-exclamation-circle fa-3x mb-3 text-danger"></i>
                        <h3>Error loading data</h3>
                        <p>Please ensure todolist.js or todolist.json exists.</p>
                        <p class="small text-muted">${error.message}</p>
                    </div>
                `;
            }
        }

        function renderTodos(todos) {
            const container = document.getElementById('todo-container');
            container.innerHTML = '';

            if (todos.length === 0) {
                container.innerHTML = `
                    <div class="col-12 empty-state">
                        <i class="fas fa-check-circle fa-3x mb-3 text-success"></i>
                        <h3>All caught up!</h3>
                        <p>No pending tasks found.</p>
                    </div>
                `;
                return;
            }

            // Sort by due date
            todos.sort((a, b) => a.due_date - b.due_date);

            todos.forEach(todo => {
                const dueDate = new Date(todo.due_date * 1000);
                const now = new Date();
                const diffTime = dueDate - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                let badgeClass = 'bg-secondary';
                let timeText = '';
                
                if (diffDays < 0) {
                    badgeClass = 'bg-danger';
                    timeText = 'Overdue';
                } else if (diffDays <= 1) {
                    badgeClass = 'bg-danger';
                    timeText = 'Due Today/Tomorrow';
                } else if (diffDays <= 7) {
                    badgeClass = 'bg-warning text-dark';
                    timeText = `Due in ${diffDays} days`;
                } else {
                    badgeClass = 'bg-info text-dark';
                    timeText = `Due in ${diffDays} days`;
                }

                const card = `
                    <div class="col-md-6 col-lg-4">
                        <div class="card todo-card h-100">
                            <div class="card-header d-flex justify-content-between align-items-center bg-white">
                                <span class="badge ${badgeClass}">${timeText}</span>
                                <small class="text-muted"><i class="far fa-clock me-1"></i>${dueDate.toLocaleDateString()} ${dueDate.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
                            </div>
                            <div class="card-body d-flex flex-column">
                                <h5 class="card-title">${todo.name}</h5>
                                <p class="card-text text-muted small mb-3">
                                    <i class="fas fa-book-open me-1"></i> ${todo.course}
                                </p>
                                <div class="mt-auto">
                                    <a href="${todo.url}" target="_blank" class="btn btn-primary btn-sm w-100 action-btn">
                                        Go to Task <i class="fas fa-external-link-alt ms-1"></i>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
            
            document.getElementById('last-updated').innerText = 'Last updated: ' + new Date().toLocaleTimeString();
        }

        // Load initially
        loadTodos();
        
        // Refresh every minute
        setInterval(loadTodos, 60000);
    </script>
</body>
</html>
